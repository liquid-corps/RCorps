<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registro Civil</title>
<style>
  /* ============================================================
     FUENTE LOCAL
     ============================================================
     Descarga la fuente "Pixel Arial 11" (búscala como "Pixel Arial 11
     font download", es una fuente pixel freeware muy común).
     Renombra el archivo descargado a exactamente:
        PixelArial11.ttf
     y colócalo en la misma carpeta que este index.html.
     Si tu archivo trae otro nombre, cambia el "src" de aquí abajo.
     ============================================================ */
  @font-face{
    font-family:'Pixel Arial 11';
    src:url('PixelArial11.ttf') format('truetype');
    font-weight:normal;
    font-style:normal;
    font-display:swap;
  }
</style>
<style>
  :root{
    --page-bg:#f1eee4;
    --card-border:#a99b78;
    --card-fill-top:#ece6d6;
    --card-fill-bottom:#e2dbc6;
    --field-bg:#f6f2e6;
    --field-border:#b6a985;
    --text-muted:#8a7c5f;
    --text-dark:#4a3a24;
    --maroon:#5a1414;
    --gray-btn:#6d6d6d;
    --gray-btn-dark:#565656;
  }

  *{box-sizing:border-box;}
  img{max-width:100%;}

  body{
    margin:0;
    min-height:100vh;
    background:var(--page-bg);
    font-family:'Pixel Arial 11', monospace;
    color:var(--text-dark);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 12px 80px;
  }

  /* ============ HOTBAR (navegación entre Wiki. / Registro.) ============ */
  .hotbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    min-height:70px;
    padding:12px 30px;
    margin-bottom:24px;
    background-image:url('assets/hotbar.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    flex-wrap:wrap;
    gap:10px;
  }
  .hotbar-nav{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
  }
  .hotbar-nav a{color:var(--text-dark);text-decoration:none;}
  .hotbar-nav a:hover{opacity:0.75;}
  .hotbar-nav .sep{color:var(--text-muted);}
  .hotbar-search{
    display:flex;
    align-items:center;
    width:320px;
    max-width:100%;
    height:38px;
    padding:0 14px;
    background-image:url('assets/barra_busqueda.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
  }
  .hotbar-search input{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    font-family:inherit;
    font-size:15px;
    color:var(--text-dark);
  }
  .hotbar-search input::placeholder{color:var(--text-muted);}
  .hotbar-search .search-icon{color:var(--text-muted);margin-left:8px;}

  /* La ficha tiene un ancho de diseño fijo (como en PC) y en pantallas
     angostas se escala completa hacia abajo (JS), en vez de reacomodar
     las columnas. Así se ve igual en celular que en computadora. */
  .card-scale-wrapper{
    position:relative;
    margin:0 auto;
  }

  .card{
    position:absolute;
    top:0;left:0;
    width:640px;
    box-sizing:border-box;
    background-image:url('assets/base_cuadrada.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:40px 36px;
    transform-origin:top left;
  }

  h1.title{
    margin:0 0 28px 0;
    font-size:54px;
    font-weight:700;
    color:var(--maroon);
    letter-spacing:1px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 185px;
    gap:0 24px;
  }

  .col-left{display:flex;flex-direction:column;}
  .col-right{display:flex;flex-direction:column;align-items:stretch;}

  label.field-label{
    font-size:14px;
    color:var(--text-dark);
    margin-bottom:6px;
    display:block;
  }

  /* caja combinada: "Etiqueta: valor" en una sola línea, como la plantilla */
  .field-box{
    display:flex;
    align-items:center;
    gap:6px;
    width:100%;
    background-image:url('assets/rectangulo_de_escribir_largo.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:10px 16px;
    margin-bottom:16px;
  }
  .field-box label{
    font-size:15px;
    color:var(--text-muted);
    white-space:nowrap;
    flex:none;
  }
  .field-box input{
    flex:1;
    min-width:0;
    font-family:inherit;
    font-size:15px;
    color:var(--text-dark);
    background:transparent;
    border:none;
    padding:0;
    margin:0;
    outline:none;
  }

  .field-box-narrow{
    max-width:220px;
    background-image:url('assets/rectangulo_de_escribir_pequeno.png');
  }

  .skills-title{font-size:19px;margin:4px 0 8px 0;}
  .skills-row{display:flex;gap:14px;margin-bottom:18px;position:relative;}
  .skill-slot{
    width:68px;height:68px;
    background-image:url('assets/cuadrado_seleccion_skills.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    padding:0;
    overflow:hidden;
  }
  .skill-slot img{
    width:70%;height:70%;
    object-fit:cover;
    opacity:1;
  }

  .clan-row{display:flex;align-items:center;gap:14px;margin-top:4px;position:relative;}
  .clan-row label.field-label{margin-bottom:0;}

  .btn-select-img{
    display:block;
    width:110px;
    height:auto;
    cursor:pointer;
  }

  /* Clan: cuando hay selección, se muestra solo la imagen (sin botón gris) */
  .clan-display{
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
  }
  .clan-display img{
    display:block;
    max-width:85px;
    height:auto;
  }
  .clan-display .fallback{
    background:var(--gray-btn);
    color:#fff;
    font-size:12px;
    padding:8px 14px;
  }

  .photo-box{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background-image:url('assets/cuadrado_foto_importacion.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    overflow:visible;
    color:var(--text-muted);
    font-size:12px;
    text-align:center;
    padding:8px;
  }
  .photo-box img.photo-img{width:100%;height:100%;object-fit:cover;border-radius:inherit;}
  .photo-box input{display:none;}

  /* Insignia de Tag decorativo sobre la foto de perfil */
  .tag-badge{
    position:absolute;
    left:50%;
    bottom:-10px;
    transform:translateX(-50%);
    width:68%;
    height:auto;
    pointer-events:none;
    z-index:5;
  }

  .bio-row{
    margin-top:18px;
    flex:1;
    display:flex;
  }
  .bio-box{
    width:100%;
    flex:1;
    background-image:url('assets/bio_panel.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:14px 18px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .bio-box label{
    font-size:15px;
    color:var(--text-muted);
    flex:none;
  }
  .bio-box textarea,
  .bio-box .bio-static{
    flex:1;
    width:100%;
    min-height:0;
    resize:none;
    font-family:inherit;
    font-size:15px;
    color:var(--text-dark);
    background:transparent;
    border:none;
    padding:0;
    margin:0;
    outline:none;
    line-height:1.4;
    white-space:pre-wrap;
    word-wrap:break-word;
    overflow-wrap:break-word;
    word-break:break-word;
    overflow:hidden;
  }
  /* Copia estática de la biografía, usada solo al capturar la imagen.
     html2canvas no siempre respeta el ajuste de línea de un <textarea>,
     así que al enviar se reemplaza momentáneamente por este <div> con
     el mismo texto y estilo, para que el recorte de línea (~35
     caracteres según el ancho de la caja) se vea igual que en pantalla. */
  .bio-box .bio-static{display:none;}

  /* ---- Panel desplegable genérico (Skills / Clan) ---- */
  .dropdown-panel{
    position:absolute;
    top:100%;
    left:0;
    margin-top:6px;
    z-index:50;
    background-image:url('assets/cuadrado_menu.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    box-shadow:0 6px 16px rgba(0,0,0,0.2);
    padding:14px;
    padding-right:26px; /* deja espacio para el scroll con imagen */
    display:none;
    max-height:280px;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch; /* scroll suave con el dedo en iOS/Android */
    scrollbar-width:thin; /* Firefox: no soporta scroll con imagen, deja uno fino */
  }
  .dropdown-panel.open{display:block;}
  .dropdown-panel .panel-hint{
    font-size:11px;color:var(--text-muted);margin-bottom:8px;
  }

  /* Scroll con imagen propia (Chrome, Edge, Safari, y sus versiones móviles).
     El arrastre táctil en celular funciona igual, esto solo cambia el look
     de la barra cuando el menú se ve en una pantalla con mouse/dedo. */
  .dropdown-panel::-webkit-scrollbar{
    width:18px;
  }
  .dropdown-panel::-webkit-scrollbar-track{
    background:transparent;
  }
  .dropdown-panel::-webkit-scrollbar-thumb{
    background-image:url('assets/scroll.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    border-radius:0;
  }
  .dropdown-panel::-webkit-scrollbar-button{
    display:none;
    height:0;
    width:0;
  }

  /* variante en grilla (Skills) */
  .dropdown-panel.grid-panel{
    width:280px;
    display:none;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .dropdown-panel.grid-panel.open{display:grid;}
  .skill-option{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;background:none;border:none;padding:4px;
    font-family:inherit;
  }
  .skill-option img{
    width:70px;height:70px;object-fit:cover;
    opacity:1;
    transition:opacity .15s ease;
  }
  .skill-option.selected img{opacity:0.5;}
  .skill-option span{font-size:10px;color:var(--text-dark);text-align:center;}

  /* variante en lista (Clan) */
  .list-panel{width:220px;}
  .list-option{
    display:block;width:100%;
    background:none;border:none;padding:4px 0;
    cursor:pointer;margin-bottom:8px;
  }
  .list-option img{
    width:100%;
    display:block;
    opacity:1;
    transition:opacity .15s ease;
  }
  .list-option.selected img{opacity:0.5;}
  .list-option .fallback{
    width:100%;padding:10px;text-align:center;
    background:var(--gray-btn);color:#fff;font-size:12px;
    opacity:1;
    transition:opacity .15s ease;
  }
  .list-option.selected .fallback{opacity:0.5;}

  .actions{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:36px;
  }
  .actions button{
    background:none;border:none;
    padding:0;
    cursor:pointer;
    display:block;
  }
  .actions button img{
    display:block;
    width:180px;
    height:auto;
  }
  .actions button:hover{opacity:0.85;}
  .actions button:disabled{opacity:0.5;cursor:not-allowed;}

  /* ---- Indicador de bloqueo (cooldown de 14 días) ---- */
  .lock-indicator{
    display:none;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:36px;
    font-size:22px;
    color:var(--text-dark);
  }
  .lock-indicator.show{display:flex;}
  .lock-indicator .lock-icon{font-size:22px;line-height:1;}

  .status{
    margin-top:18px;
    text-align:center;
    font-size:13px;
    min-height:20px;
  }
  .status.ok{color:#2f5a2f;}
  .status.err{color:#8a1f1f;}

  /* ---- Modal de error (campos incompletos) ---- */
  .error-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.2);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
    cursor:pointer;
    padding:20px;
  }
  .error-overlay.open{display:flex;}
  .error-box{
    background:linear-gradient(180deg,var(--card-fill-top),var(--card-fill-bottom));
    border:2px solid var(--card-border);
    outline:5px solid #fff;
    padding:30px 34px;
    max-width:420px;
    width:100%;
  }
  .error-title{
    font-size:34px;
    color:var(--text-dark);
    margin-bottom:14px;
  }
  .error-message{
    font-size:16px;
    line-height:1.5;
    color:var(--text-muted);
  }
  .error-hint{
    margin-top:16px;
    font-size:11px;
    color:var(--text-muted);
    opacity:0.8;
  }

  /* ---- Botón e ícono "Tags" (flotante, fuera de la ficha) ---- */
  .tags-widget{
    position:fixed;
    top:86px;
    right:24px;
    z-index:80;
  }
  .tags-trigger{
    display:block;
    background:linear-gradient(180deg,var(--card-fill-top),var(--card-fill-bottom));
    border:2px solid var(--card-border);
    font-family:inherit;
    font-size:16px;
    color:var(--text-dark);
    padding:10px 26px;
    cursor:pointer;
  }
  .tags-trigger:hover{opacity:0.85;}

  .tags-panel{
    width:260px;
    right:0;
    left:auto;
  }
  .tags-panel .list-option{margin-bottom:10px;}
  .tags-panel .list-option:last-child{margin-bottom:0;}

  @media (max-width:720px){
    .tags-widget{position:absolute;top:78px;right:12px;}
  }

  /* Nota: ya no reacomodamos a una columna en móvil — la ficha completa
     se escala hacia abajo (ver script al final) para verse igual que en PC. */
</style>
</head>

<div class="hotbar">
  <div class="hotbar-nav">
    <a href="libreria.html">Libreria.</a>

<div class="tags-widget" id="tags-widget">

</div>

<div class="card-scale-wrapper" id="card-scale-wrapper">
<div class="card" id="card">
  <h1 class="title">Civil</h1>

  <div class="grid">
    <div class="col-left">
      <div class="field-box">
        <label for="f-name">Name:</label>
        <input type="text" id="f-name" />
      </div>

      <div class="field-box">
        <label for="f-age">Age:</label>
        <input type="number" id="f-age" min="0" />

      <div class="field-box field-box-narrow">
        <label for="f-rank">Rank:</label>
        <input type="text" id="f-rank" />
      </div>

      <div class="field-box">
        <label for="f-zodiacal">Zodiacal:</label>
        <input type="text" id="f-zodiacal" />
      </div>

      <div class="skills-title">Skills <span style="font-size:11px;color:var(--text-muted);">(máx. 2)</span></div>
      <div class="skills-row">
        <div class="skill-slot" id="skill-slot-1"></div>
        <div class="skill-slot" id="skill-slot-2"></div>
        <div class="dropdown-panel grid-panel" id="skills-panel"></div>
      </div>

      <div class="clan-row">
        <label class="field-label">Clan:</label>
        <div class="clan-display" id="clan-display"></div>
        <div class="dropdown-panel list-panel" id="clan-panel"></div>
      </div>
    </div>

    <div class="col-right">
      <div class="photo-box" id="photo-box">
        <span id="photo-placeholder">Foto</span>
        <img class="tag-badge" id="photo-tag-badge" style="display:none;" alt="" />
        <input type="file" id="f-photo" accept="image/*" />
      </div>

      <div class="field-box" style="margin-top:18px;">
        <label>Fecha:</label>
        <span id="f-fecha-display"></span>
      </div>

      <div class="bio-row">
        <div class="bio-box">
          <label for="f-bio">Biografía:</label>
          <textarea id="f-bio" placeholder="Escribe aquí..."></textarea>
          <div class="bio-static"></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<div class="actions" id="actions">
  <button type="button" id="btn-limpiar"><img src="assets/boton_limpiar.png" alt="Limpiar" /></button>
  <button type="button" id="btn-enviar"><img src="assets/boton_enviar.png" alt="Enviar" /></button>
</div>

<div class="lock-indicator" id="lock-indicator">
  <span class="lock-icon">🔒</span><span id="lock-days-text">14d</span>
</div>

<div class="status" id="status"></div>

<!-- Modal de confirmación de envío -->
<div class="error-overlay" id="confirm-overlay">
  <div class="error-box">
    <div class="error-message" style="text-align:center;font-size:20px;line-height:1.5;">
      ¿Estás seguro de que quieres enviar? no podrás enviarme registros hasta en 14 días.
    </div>
    <div class="actions" style="margin-top:26px;gap:50px;">
      <button type="button" id="confirm-send" style="font-family:inherit;font-size:22px;color:#1a4fb5;text-decoration:underline;text-decoration-style:dotted;">Enviar</button>
      <button type="button" id="confirm-cancel" style="font-family:inherit;font-size:22px;color:var(--maroon);text-decoration:underline;text-decoration-style:dotted;">Cancelar</button>
    </div>
  </div>
</div>

<div class="error-overlay" id="error-overlay">
  <div class="error-box">
    <div class="error-title">Error:</div>
    <div class="error-message" id="error-message">
      Olvidaste un campo por completar.<br>Por favor completa todos los campos.
    </div>
    <div class="error-hint">(toca este mensaje para cerrarlo)</div>
  </div>
</div>

  { name: "Pistola Enjambre", image: "Skills/pistola_enjambre.png" },
  { name: "Relámpago Negro", image: "Skills/relampago_negro.png" },
  { name: "Sangre Explosiva", image: "Skills/sangre_explosiva.png" },
  { name: "Sueño", image: "Skills/sueno.png" },
  { name: "Tambores", image: "Skills/tambores.png" },
  { name: "Temari", image: "Skills/temari.png" },
  { name: "Vasijas", image: "Skills/vasijas.png" },
];

const MAX_SKILLS = 2;

// Carpeta Tags/ -> imagen decorativa completa de cada tag (0001.png a 0050.png).
const TAG_OPTIONS = Array.from({length:96}, (_, i)=>{
  const num = String(i+1).padStart(4,'0');
  return { name: 'Tag ' + num, image: `Tags/${num}.gif` };
});

// Cuánto dura el bloqueo tras enviar un registro (en milisegundos).
const COOLDOWN_MS = 14 * 24 * 60 * 60 * 1000; // 14 días
const COOLDOWN_STORAGE_KEY = 'registroCivil_lastSubmit';

/* ================================================================
   LÓGICA — normalmente no necesitas tocar nada de aquí abajo
   ================================================================ */

const $ = (id) => document.getElementById(id);
const card = $('card');

/* ---------- Escalar la ficha completa en pantallas angostas ----------
   La ficha tiene un ancho de diseño fijo (640px, igual que en PC).
   En vez de reacomodar las columnas en móvil, se escala entera hacia
   abajo para que se vea idéntica, solo más chica. */
const cardWrapper = $('card-scale-wrapper');
const CARD_DESIGN_WIDTH = 640;

function updateCardScale(){
  card.style.transform = 'scale(1)';
  const naturalWidth = card.offsetWidth;
  const naturalHeight = card.offsetHeight;
  const available = cardWrapper.parentElement.clientWidth;
  const scale = Math.min(1, available / naturalWidth);
  card.style.transform = `scale(${scale})`;
  cardWrapper.style.width = (naturalWidth * scale) + 'px';
  cardWrapper.style.height = (naturalHeight * scale) + 'px';
}
window.addEventListener('resize', updateCardScale);
window.addEventListener('orientationchange', updateCardScale);
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(updateCardScale);
}
updateCardScale();

/* ---------- Fecha: automática, siempre la de hoy, no editable ---------- */
const today = new Date();
const todayFormatted =
  String(today.getDate()).padStart(2,'0') + '/' +
  String(today.getMonth()+1).padStart(2,'0') + '/' +
  String(today.getFullYear()).slice(-2);
$('f-fecha-display').textContent = todayFormatted;

/* Los menús (Skills/Clan) ahora se posicionan solo con CSS
   (position:absolute; top:100%) relativos a su propio botón, así
   que no hace falta calcular nada en JS ni preocuparse por el
   escalado de la ficha en móvil. */

function closeAllPanels(except){
  document.querySelectorAll('.dropdown-panel').forEach(p=>{
    if(p!==except) p.classList.remove('open');
  });
}
document.addEventListener('click', (e)=>{
  const isPanel = e.target.closest('.dropdown-panel');
  const isTrigger = e.target.closest('.clan-display, .skill-slot, .tags-trigger');
  if(!isPanel && !isTrigger) closeAllPanels(null);
});

/* ---------- Imagen con fallback de texto si no existe el archivo ---------- */
function imgWithFallback(src, alt, className){
  const wrap = document.createElement('span');
  const img = document.createElement('img');
  img.src = src; img.alt = alt; if(className) img.className = className;
  img.onerror = ()=>{
    img.remove();
    const fb = document.createElement('span');
    fb.className = 'fallback';
    fb.textContent = alt;
    wrap.appendChild(fb);
  };
  wrap.appendChild(img);
  return wrap;
}

/* ---------- Skills: panel en grilla, selección compartida máx. 2 ---------- */
let selectedSkills = []; // {name, image}
const skillsPanel = $('skills-panel');

SKILL_OPTIONS.forEach(opt=>{
  const btn = document.createElement('button');
  btn.type='button';
  btn.className='skill-option';
  const img = document.createElement('img');
  img.src = opt.image; img.alt = opt.name;
  img.onerror = ()=>{ img.style.background = '#ccc'; };
  const label = document.createElement('span');
  label.textContent = opt.name;
  btn.appendChild(img);
  btn.appendChild(label);
  btn.dataset.name = opt.name;
  btn.addEventListener('click', ()=> toggleSkill(opt, btn));
  skillsPanel.appendChild(btn);
});

function toggleSkill(opt, btn){
  const idx = selectedSkills.findIndex(s=>s.name===opt.name);
  if(idx>=0){
    selectedSkills.splice(idx,1);
    btn.classList.remove('selected');
  } else {
    if(selectedSkills.length>=MAX_SKILLS){
      alert('Máximo '+MAX_SKILLS+' skills.');
      return;
    }
    selectedSkills.push(opt);
    btn.classList.add('selected');
  }
  renderSkillSlots();
}

function renderSkillSlots(){
  [1,2].forEach(n=>{
    const slot = $('skill-slot-'+n);
    slot.innerHTML='';
    const skill = selectedSkills[n-1];
    if(skill){
      const img = document.createElement('img');
      img.src = skill.image; img.alt = skill.name; img.title = skill.name;
      img.onerror = ()=>{ slot.innerHTML=''; slot.textContent = skill.name; slot.style.fontSize='10px'; };
      slot.appendChild(img);
    }
    // si no hay skill, se deja vacío: el fondo cuadrado_seleccion_skills.png ya muestra el "+"
  });
}
renderSkillSlots();

[$('skill-slot-1'), $('skill-slot-2')].forEach(slot=>{
  slot.addEventListener('click', (e)=>{
    e.stopPropagation();
    const willOpen = !skillsPanel.classList.contains('open');
    closeAllPanels(skillsPanel);
    if(willOpen){ skillsPanel.classList.add('open'); }
    else skillsPanel.classList.remove('open');
  });
});

/* ---------- Clan: panel en lista, selección única ---------- */
let selectedClan = null;
const clanPanel = $('clan-panel');
const clanDisplay = $('clan-display');

function renderClanDisplay(){
  clanDisplay.innerHTML='';
  if(selectedClan){
    clanDisplay.appendChild(imgWithFallback(selectedClan.image, selectedClan.name));
  } else {
    const img = document.createElement('img');
    img.src = 'assets/menu_seleccion.png';
    img.alt = 'Seleccionar';
    img.className = 'btn-select-img';
    clanDisplay.appendChild(img);
  }
}
renderClanDisplay();

CLAN_OPTIONS.forEach(opt=>{
  const btn = document.createElement('button');
  btn.type='button';
  btn.className='list-option';
  btn.appendChild(imgWithFallback(opt.image, opt.name));
  btn.addEventListener('click', ()=>{
    if(selectedClan && selectedClan.name===opt.name){
      // ya estaba seleccionado -> deseleccionar (vuelve a 100% visible)
      selectedClan = null;
      btn.classList.remove('selected');
    } else {
      selectedClan = opt;
      clanPanel.querySelectorAll('.list-option').forEach(o=>o.classList.remove('selected'));
      btn.classList.add('selected');
    }
    renderClanDisplay();
  });
  clanPanel.appendChild(btn);
});

clanDisplay.addEventListener('click', (e)=>{
  e.stopPropagation();
  const willOpen = !clanPanel.classList.contains('open');
  closeAllPanels(clanPanel);
  if(willOpen){ clanPanel.classList.add('open'); }
  else clanPanel.classList.remove('open');
});

/* ---------- Tags decorativos: panel en lista, selección única ----------
   Usa el mismo panel/menú (fondo cuadrado_menu.png, scrollbar propia) y
   el mismo mecanismo de selección que Skills/Clan. El tag elegido se
   muestra como insignia sobre la foto de perfil. */
let selectedTag = null;
const tagsPanel = $('tags-panel');
const tagsTrigger = $('tags-trigger');
const photoTagBadge = $('photo-tag-badge');

function renderTagBadge(){
  if(selectedTag){
    photoTagBadge.src = selectedTag.image;
    photoTagBadge.alt = selectedTag.name;
    photoTagBadge.style.display = 'block';
    photoTagBadge.onerror = ()=>{ photoTagBadge.style.display = 'none'; };
  } else {
    photoTagBadge.style.display = 'none';
    photoTagBadge.removeAttribute('src');
  }
}

TAG_OPTIONS.forEach(opt=>{
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'list-option';
  btn.appendChild(imgWithFallback(opt.image, opt.name));
  btn.addEventListener('click', ()=>{
    if(selectedTag && selectedTag.name === opt.name){
      selectedTag = null;
      btn.classList.remove('selected');
    } else {
      selectedTag = opt;
      tagsPanel.querySelectorAll('.list-option').forEach(o=>o.classList.remove('selected'));
      btn.classList.add('selected');
    }
    renderTagBadge();
  });
  tagsPanel.appendChild(btn);
});

tagsTrigger.addEventListener('click', (e)=>{
  e.stopPropagation();
  const willOpen = !tagsPanel.classList.contains('open');
  closeAllPanels(tagsPanel);
  if(willOpen){ tagsPanel.classList.add('open'); }
  else tagsPanel.classList.remove('open');
});

/* ---------- Foto ---------- */
const photoBox = $('photo-box');
const photoInput = $('f-photo');
const photoPlaceholder = $('photo-placeholder');
let photoFile = null;
photoBox.addEventListener('click', ()=> photoInput.click());
photoInput.addEventListener('change', ()=>{
  const file = photoInput.files[0];
  if(!file) return;
  photoFile = file;
  const reader = new FileReader();
  reader.onload = (e)=>{
    photoPlaceholder.style.display='none';
    let img = photoBox.querySelector('img.photo-img');
    if(!img){
      img = document.createElement('img');
      img.className = 'photo-img';
      photoBox.insertBefore(img, $('photo-tag-badge'));
    }
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

/* ---------- Limpiar ---------- */
$('btn-limpiar').addEventListener('click', ()=>{
  $('f-name').value='';
  $('f-age').value='';
  $('f-rank').value='';
  $('f-zodiacal').value='';

  selectedSkills = [];
  skillsPanel.querySelectorAll('.skill-option').forEach(o=>o.classList.remove('selected'));
  renderSkillSlots();

  selectedClan = null;
  clanPanel.querySelectorAll('.list-option').forEach(o=>o.classList.remove('selected'));
  renderClanDisplay();

  $('f-bio').value='';

  photoFile=null;
  photoInput.value='';
  const img = photoBox.querySelector('img.photo-img');
  if(img) img.remove();
  photoPlaceholder.style.display='block';

  selectedTag = null;
  if(tagsPanel) tagsPanel.querySelectorAll('.list-option').forEach(o=>o.classList.remove('selected'));
  renderTagBadge();

  $('status').textContent='';
  closeAllPanels(null);
});

/* ---------- Modal de error (campos incompletos) ---------- */
const errorOverlay = $('error-overlay');
const errorMessageEl = $('error-message');

function showError(message){
  if(message) errorMessageEl.innerHTML = message;
  errorOverlay.classList.add('open');
}
errorOverlay.addEventListener('click', ()=> errorOverlay.classList.remove('open'));

function getMissingFields(){
  const missing = [];
  if(!$('f-name').value.trim()) missing.push('Name');
  if(!$('f-age').value.trim()) missing.push('Age');
  if(!$('f-rank').value.trim()) missing.push('Rank');
  if(!$('f-zodiacal').value.trim()) missing.push('Zodiacal');
  if(!photoFile) missing.push('Foto');
  if(selectedSkills.length===0) missing.push('Skills');
  if(!selectedClan) missing.push('Clan');
  return missing;
}

/* ---------- Bloqueo de 14 días entre registros ----------
   El timestamp del último envío se guarda en localStorage, así que
   el bloqueo se mantiene aunque se recargue la página o se cierre
   el navegador. Solo se libera cuando pasan los 14 días completos. */
const actionsEl = $('actions');
const lockIndicatorEl = $('lock-indicator');
const lockDaysTextEl = $('lock-days-text');

function getCooldownRemainingMs(){
  const last = parseInt(localStorage.getItem(COOLDOWN_STORAGE_KEY) || '0', 10);
  if(!last) return 0;
  const elapsed = Date.now() - last;
  const remaining = COOLDOWN_MS - elapsed;
  return remaining > 0 ? remaining : 0;
}

function refreshLockUI(){
  const remainingMs = getCooldownRemainingMs();
  if(remainingMs > 0){
    const daysLeft = Math.ceil(remainingMs / (24*60*60*1000));
    lockDaysTextEl.textContent = daysLeft + 'd';
    lockIndicatorEl.classList.add('show');
    actionsEl.style.display = 'none';
  } else {
    lockIndicatorEl.classList.remove('show');
    actionsEl.style.display = 'flex';
  }
  return remainingMs > 0;
}
refreshLockUI();
// Revisa cada minuto por si el bloqueo ya venció mientras la página
// seguía abierta, para reactivar los botones sin necesidad de recargar.
setInterval(refreshLockUI, 60*1000);

/* ---------- Modal de confirmación de envío ---------- */
const confirmOverlay = $('confirm-overlay');
// Clic en el fondo oscuro (fuera de la caja) también cancela.
confirmOverlay.addEventListener('click', (e)=>{
  if(e.target === confirmOverlay) confirmOverlay.classList.remove('open');
});
$('confirm-cancel').addEventListener('click', ()=>{
  confirmOverlay.classList.remove('open');
});
$('confirm-send').addEventListener('click', ()=>{
  confirmOverlay.classList.remove('open');
  performSubmit();
});

/* ---------- Enviar al webhook de Discord ----------
   En vez de mandar los datos como texto, se captura la ficha
   (tal cual se ve en pantalla, ya rellena) como una imagen y
   esa imagen es lo que se envía al canal. Antes de enviar de verdad
   se pregunta con un modal de confirmación, porque después de enviar
   hay que esperar 14 días para poder mandar otro registro. */
$('btn-enviar').addEventListener('click', ()=>{
  const statusEl = $('status');
  statusEl.className='status';
  statusEl.textContent='';

  if(WEBHOOK_URL.includes('PON_AQUI')){
    statusEl.className='status err';
    statusEl.textContent='Falta configurar la URL del Webhook en el código (WEBHOOK_URL).';
    return;
  }

  if(refreshLockUI()){
    // Todavía en cooldown; no debería poder llegar aquí porque los
    // botones están ocultos, pero se valida por si acaso.
    return;
  }

  const missing = getMissingFields();
  if(missing.length){
    showError('Olvidaste un campo por completar.<br>Por favor completa todos los campos.');
    return;
  }

  closeAllPanels(null);
  confirmOverlay.classList.add('open');
});

async function performSubmit(){
  const statusEl = $('status');
  const name = $('f-name').value.trim();

  statusEl.className='status';
  statusEl.textContent='Generando imagen...';
  $('btn-enviar').disabled = true;

  try{
    // Para la captura siempre usamos el tamaño real de diseño (640px),
    // sin el encogido visual que se aplica en pantallas angostas.
    const previousTransform = card.style.transform;
    card.style.transform = 'scale(1)';

    // html2canvas no siempre respeta el ajuste de línea de un <textarea>
    // (el texto se corre / se ve cortado en la captura aunque en pantalla
    // se vea bien). Para evitarlo, mientras se genera la imagen se
    // reemplaza el textarea por un <div> estático con el mismo texto,
    // que sí se ajusta línea por línea igual que en la página.
    const bioTextarea = $('f-bio');
    const bioStatic = bioTextarea.parentElement.querySelector('.bio-static');
    bioStatic.textContent = bioTextarea.value;
    bioTextarea.style.display = 'none';
    bioStatic.style.display = 'block';

    const canvas = await html2canvas(card, {
      backgroundColor: '#f1eee4',
      scale: 2,
      useCORS: true
    });

    bioTextarea.style.display = '';
    bioStatic.style.display = 'none';

    card.style.transform = previousTransform;

    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
    const fileName = 'ficha_' + name.replace(/\s+/g,'_') + '.png';

    statusEl.textContent='Enviando...';

    const formData = new FormData();
    formData.append('payload_json', JSON.stringify({
      content: `**Nuevo registro:** ${name}`
    }));
    formData.append('files[0]', blob, fileName);

    const response = await fetch(WEBHOOK_URL, { method:'POST', body:formData });

    if(response.ok){
      statusEl.className='status ok';
      statusEl.textContent='¡Registro enviado con éxito!';
      // Se guarda el momento del envío para bloquear nuevos registros
      // durante 14 días, incluso si se recarga la página.
      localStorage.setItem(COOLDOWN_STORAGE_KEY, String(Date.now()));
      refreshLockUI();
    } else {
      statusEl.className='status err';
      statusEl.textContent='Error al enviar (código '+response.status+'). Revisa la URL del webhook.';
    }
  } catch(err){
    statusEl.className='status err';
    statusEl.textContent='No se pudo generar o enviar la imagen. Revisa la consola para más detalles.';
    console.error(err);
  } finally {
    $('btn-enviar').disabled = false;
  }
}

/* ---------- Barra de búsqueda del hotbar (lleva a la Wiki) ----------
   Esta ficha no tiene artículos propios, así que la búsqueda solo
   redirige a wiki.html con el término (o abre el editor secreto de
   la wiki si escribes el código ahí). */
const hotbarSearchInput = $('hotbar-search-input');
if(hotbarSearchInput){
  hotbarSearchInput.addEventListener('keydown', (e)=>{
    if(e.key !== 'Enter') return;
    const val = hotbarSearchInput.value.trim();
    if(!val) return;
    if(val === 'a3a#HGD#LNLBw7s'){
      window.location.href = 'libreria.html?code=' + encodeURIComponent(val);
    } else {
      window.location.href = 'libreria.html?search=' + encodeURIComponent(val);
    }
  });
}
</script>

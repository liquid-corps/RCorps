<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil - RCorps</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@400;700&display=swap');
  @font-face{
    font-family:'Pixel Arial 11';
    src:url('PixelArial11.ttf') format('truetype');
    font-weight:normal;
    font-style:normal;
    font-display:swap;
  }
  :root{
    --page-bg:#f1eee4;
    --card-bg:#F5EBE6;
    --card-border:#a99b78;
    --field-bg:#f6f2e6;
    --field-border:#b6a985;
    --text-dark:#4a3a24;
    --text-muted:#8a7c5f;
    --admin-color:#5a1414;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--page-bg);
    font-family:'Pixel Arial 11', monospace;
    color:var(--text-dark);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 12px 80px;
  }

  /* ============ TOP NAV ============ */
  .hotbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    min-height:70px;
    padding:12px 30px;
    margin-bottom:24px;
    background-image:url('assets/hotbar.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    flex-wrap:wrap;
    gap:10px;
  }
  .hotbar-nav{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
  }
  .hotbar-nav a{color:var(--text-dark);text-decoration:none;}
  .hotbar-nav a:hover{opacity:0.75;}
  .hotbar-nav .sep{color:var(--text-muted);}
  .hotbar-nav .active{font-weight:bold;text-decoration:underline;text-decoration-style:dotted;}

  /* Badge de ADMIN en la barra */
  .admin-badge{
    background:var(--admin-color);
    color:#fff;
    font-size:10px;
    padding:3px 8px;
    border-radius:3px;
    font-weight:bold;
    letter-spacing:0.5px;
  }

  /* ============ LOGIN VIEW ============ */
  .login-view{
    width:100%;
    max-width:450px;
    background:#f5f0e6;
    border:1.5px solid #a3967d;
    border-radius:6px;
    padding:30px;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
    box-shadow:0 6px 12px rgba(0,0,0,0.05);
    margin:40px auto;
  }
  .login-view h1{
    margin:0;
    color:#4e3629;
    font-size:28px;
    font-family:'Courier New',monospace;
    font-weight:bold;
  }
  .login-view p{
    margin:0;
    color:#555;
    max-width:320px;
    line-height:1.5;
    font-size:13px;
  }
  .login-view .discord-btn{
    background:#5865F2;
    color:#f5f0e6;
    border:2px solid #404eed;
    border-radius:4px;
    padding:10px 24px;
    font-weight:bold;
    font-size:0.95em;
    text-transform:uppercase;
    letter-spacing:1px;
    cursor:pointer;
    box-shadow:3px 3px 0px #000;
    transition:all 0.1s ease;
    margin:15px 0;
    font-family:inherit;
    display:inline-flex;
    align-items:center;
    gap:8px;
  }
  .login-view .discord-btn:hover{
    background:#4752c4;
    box-shadow:1px 1px 0px #000;
    transform:translate(2px,2px);
  }
  .login-view .discord-btn:active{
    transform:translate(3px,3px);
    box-shadow:none;
  }

  /* ============ PROFILE CARD ============ */
  .card{
    width:100%;
    max-width:640px;
    background:var(--card-bg);
    border:3px solid var(--card-border);
    border-radius:6px;
    padding:24px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
    overflow:visible;
  }

  /* ---- LEFT COLUMN ---- */
  .col-left{display:flex;flex-direction:column;gap:18px;position:relative;}

  /* Photo + Tag wrapper (CLAVE: overflow visible para que el tag no se corte) */
  .photo-wrapper{
    position:relative;
    width:100%;
    /* Reservamos espacio ABAJO para que el tag tenga hueco sin solaparse */
    margin-bottom:48px;
  }
  .photo-box{
    width:100%;
    aspect-ratio:1/1;
    background-image:url('assets/cuadrado_foto_importacion.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-muted);
    font-size:14px;
    cursor:default;
    border-radius:6px;
    overflow:hidden;
  }
  .photo-box.editable{cursor:pointer;}
  .photo-box img.photo-img{
    width:100%;height:100%;object-fit:cover;display:none;
  }
  .photo-box.has-img img.photo-img{display:block;}
  .photo-box.has-img .placeholder{display:none;}
  .photo-box .placeholder{padding:8px;text-align:center;}

  /* Tag badge — posicionado DEBAJO de la foto, sin solaparse */
  .tag-badge{
    position:absolute;
    left:50%;
    /* Dentro del photo-box, pegado al borde inferior, sin salirse */
    bottom:6px;
    transform:translateX(-50%);
    width:64%;
    max-height:38%;
    object-fit:contain;
    display:none;
    z-index:10;
    pointer-events:none;
  }
  .tag-badge.show{display:block;}

  .btn-select-tag{
    background:var(--field-bg);
    border:2px solid var(--field-border);
    color:var(--text-dark);
    padding:8px 12px;
    font-family:inherit;
    font-size:12px;
    cursor:pointer;
    width:100%;
  }
  .btn-select-tag:hover{background:#e8e2d4;}
  .btn-select-tag:disabled{opacity:0.5;cursor:default;}

  /* Skills */
  .skills-block{position:relative;}
  .skills-block .section-label{
    font-size:13px;color:var(--text-dark);margin-bottom:6px;
  }
  .skills-row{display:flex;gap:12px;}
  .skill-slot{
    flex:1;
    aspect-ratio:1/1;
    background-image:url('assets/cuadrado_seleccion_skills.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-muted);
    font-size:20px;
    cursor:default;
  }
  .skill-slot.editable{cursor:pointer;}
  .skill-slot .plus{display:block;}
  .skill-slot img.skill-img{width:70%;height:70%;object-fit:cover;display:none;}
  .skill-slot.has-img img.skill-img{display:block;}
  .skill-slot.has-img .plus{display:none;}

  /* Clan */
  .clan-wrap{position:relative;}
  .clan-display{
    position:relative;
    padding:0;
    overflow:visible;
    min-height:52px;
    cursor:default;
    justify-content:center;
  }
  .clan-display.editable{cursor:pointer;}
  .clan-placeholder{font-size:13px;color:var(--text-muted);padding:8px 12px;}
  .clan-icon{
    width:100%;
    height:56px;
    object-fit:contain;
    display:block;
  }
  /* Cuando hay clan, sin caja ni bordes: solo la imagen limpia */
  .clan-display.has-clan{
    background:transparent;
    border:none;
    padding:0;
  }
  /* Panel desplegable de clanes con iconos */
  .clan-dropdown{
    position:absolute;
    top:calc(100% + 4px);
    left:0;
    right:0;
    z-index:50;
    background:var(--field-bg);
    border:2px solid var(--card-border);
    border-radius:6px;
    padding:6px;
    display:none;
    max-height:260px;
    overflow-y:auto;
    box-shadow:0 8px 20px rgba(0,0,0,0.18);
  }
  .clan-dropdown.open{display:block;}
  .clan-option{
    display:flex;
    align-items:center;
    gap:10px;
    width:100%;
    padding:6px 8px;
    background:transparent;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-family:inherit;
    font-size:14px;
    color:var(--text-dark);
    text-align:left;
  }
  .clan-option:hover{background:rgba(169,155,120,0.25);}
  .clan-option.selected{background:rgba(169,155,120,0.4);}
  .clan-option img{height:34px;max-width:90px;object-fit:contain;}
  .field-block{display:flex;flex-direction:column;gap:6px;}
  .field-block label{font-size:12px;color:var(--text-muted);}
  .field-value{
    background:var(--field-bg);
    border:2px solid var(--field-border);
    padding:8px 12px;
    font-family:inherit;
    font-size:14px;
    color:var(--text-dark);
    min-height:34px;
    display:flex;
    align-items:center;
  }
  .field-value.readonly{
    background:#e8e2d4;
    color:var(--text-muted);
  }
  .field-value input,.field-value select{
    width:100%;
    border:none;
    background:transparent;
    outline:none;
    font-family:inherit;
    font-size:14px;
    color:var(--text-dark);
    padding:0;
  }

  /* ---- RIGHT COLUMN ---- */
  .col-right{display:flex;flex-direction:column;gap:14px;}
  .col-right .data-field{display:flex;flex-direction:column;gap:6px;}
  .col-right .data-field label{font-size:12px;color:var(--text-muted);}
  .col-right .data-field .field-value{background:var(--field-bg);}
  .col-right .data-field .field-value.readonly{background:#e8e2d4;color:var(--text-muted);}
  .col-right .data-field .field-value input{
    width:100%;border:none;background:transparent;outline:none;
    font-family:inherit;font-size:14px;color:var(--text-dark);padding:0;
  }
  .col-right .narrow{max-width:60%;}

  /* Bio */
  .bio-box{flex:1;display:flex;flex-direction:column;gap:6px;min-height:140px;}
  .bio-box label{font-size:12px;color:var(--text-muted);}
  .bio-box textarea{
    flex:1;
    background:var(--field-bg);
    border:2px solid var(--field-border);
    padding:10px 12px;
    font-family:inherit;
    font-size:13px;
    color:var(--text-dark);
    resize:none;
    outline:none;
    line-height:1.5;
    min-height:120px;
  }
  .bio-box textarea.readonly{
    background:#e8e2d4;
    color:var(--text-muted);
  }

  /* ============ BOTONES ============ */
  .btn-outer{width:100%;max-width:640px;}
  .card-btn-row{
    display:flex;
    gap:12px;
    justify-content:center;
    align-items:center;
    padding:16px;
    background:var(--card-bg);
    border:3px solid var(--card-border);
    border-top:none;
    border-radius:0 0 6px 6px;
  }
  .card-btn-row button{display:flex;align-items:center;gap:6px;}
  .card-btn-row button:disabled{opacity:0.5;cursor:not-allowed;}
  .perfil-btn{
    font-family:inherit;font-size:12px;font-weight:bold;text-transform:uppercase;
    cursor:pointer;border-radius:4px;padding:6px 14px;
    border:1.5px solid;transition:all 0.2s ease;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.15), 0 2px 4px rgba(0,0,0,0.4);
  }
  .perfil-btn-edit{
    background:linear-gradient(180deg,#444,#222);
    color:#e0d9ca;border-color:#a3967d;
  }
  .perfil-btn-edit:hover{
    background:linear-gradient(180deg,#555,#333);
    color:#fff;
  }
  .perfil-btn-logout{
    background:linear-gradient(180deg,#d4a373,#a97142);
    color:#1a1105;border-color:#7f5539;
  }
  .perfil-btn-logout:hover{
    background:linear-gradient(180deg,#e6b88a,#bc8153);
  }
  .perfil-btn-delete{
    background:linear-gradient(180deg,#38513c,#1e2f21);
    color:#e0d9ca;border-color:#273e2b;
  }
  .perfil-btn-delete:hover{
    background:linear-gradient(180deg,#47664c,#273e2b);
    color:#fff;
  }
  .edit-btn{
    font-family:inherit;font-size:12px;font-weight:bold;text-transform:uppercase;
    cursor:pointer;border-radius:4px;padding:6px 16px;
    border:1.5px solid;margin:0 5px;display:inline-block;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.4);
    transition:all 0.2s ease;
  }
  .edit-btn-cancel{
    background:linear-gradient(180deg,#782727,#4a1414);
    color:#e0d9ca;border-color:#2d0a0a;
  }
  .edit-btn-cancel:hover{filter:brightness(1.2);}
  .edit-btn-submit{
    background:linear-gradient(180deg,#38513c,#1e2f21);
    color:#e0d9ca;border-color:#273e2b;
  }
  .edit-btn-submit:hover{
    background:linear-gradient(180deg,#47664c,#273e2b);
    color:#fff;
  }

  .custom-card-section{
    margin-top:14px;padding:15px;
    border:1px dashed #a3967d;border-radius:6px;
    background:rgba(0,0,0,0.02);
  }
  .custom-card-label{
    font-size:11px;color:#4e3629;display:block;margin-bottom:8px;
    font-weight:bold;text-transform:uppercase;
  }
  .custom-card-row{display:flex;gap:12px;flex-wrap:wrap;}
  .custom-card-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:90px;}
  .custom-card-field label{font-size:10px;color:#4e3629;font-weight:bold;text-transform:uppercase;}
  .custom-card-field input[type=color]{
    width:100%;height:32px;padding:2px;border:1px solid #a3967d;
    border-radius:4px;cursor:pointer;background:#f6f2e6;
  }
  .custom-card-field select{
    font-family:inherit;font-size:11px;padding:4px 6px;
    border:1px solid #a3967d;border-radius:4px;
    background:#f6f2e6;color:#4a3a24;cursor:pointer;
  }
  .theme-row{margin-top:10px;}
  .theme-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0;}
  .theme-btn{
    padding:5px;font-size:10px;font-weight:bold;text-transform:uppercase;
    border-radius:3px;cursor:pointer;border:1px solid rgba(0,0,0,0.2);
    box-shadow:1px 1px 0px #000;transition:all 0.1s ease;font-family:inherit;
  }
  .theme-btn:hover{transform:translate(1px,1px);box-shadow:0px 0px 0px #000;}
  #btn-save-card{
    display:block;width:100%;margin-top:8px;padding:8px 16px;
    background:linear-gradient(180deg,#d4a373,#a97142);
    color:#1a1105;border:1.5px solid #7f5539;border-radius:4px;
    font-family:inherit;font-weight:bold;font-size:13px;
    text-transform:uppercase;letter-spacing:1px;
    box-shadow:2px 2px 0px #000;cursor:pointer;
    transition:all 0.1s ease;
  }
  #btn-save-card:hover{
    background:linear-gradient(180deg,#e6b88a,#bc8153);
    box-shadow:1px 1px 0px #000;
    transform:translate(1px,1px);
  }
  .hidden{display:none !important;}

  /* ============ DROPDOWN PANELS (Skills / Tags) ============ */
  .dropdown-panel{
    position:absolute;
    z-index:200;
    background:var(--card-bg);
    border:2px solid var(--card-border);
    padding:12px;
    box-shadow:0 6px 16px rgba(0,0,0,0.3);
    display:none;
    max-height:220px;
    overflow-y:auto;
    scrollbar-width:thin;
    scrollbar-color:var(--text-muted) transparent;
  }
  .dropdown-panel.open{display:block;}
  .dropdown-panel::-webkit-scrollbar{width:14px;}
  .dropdown-panel::-webkit-scrollbar-track{background:transparent;}
  .dropdown-panel::-webkit-scrollbar-thumb{
    background-image:url('assets/scroll.png');
    background-size:100% 100%;background-repeat:no-repeat;
  }

  /* Grid de skills (4 columnas) */
  .skills-dropdown{
    width:300px;
    grid-template-columns:repeat(4, 1fr);
    gap:8px;
  }
  .skills-dropdown.open{display:grid;}
  .skill-option{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;padding:4px;cursor:pointer;font-family:inherit;
  }
  .skill-option img{
    width:48px;height:48px;object-fit:cover;border:1px solid var(--field-border);
  }
  .skill-option span{font-size:8px;color:var(--text-dark);text-align:center;line-height:1.1;}
  .skill-option.selected img{opacity:0.5;}

  /* Lista de tags (1 columna) */
  .tags-dropdown{
    width:200px;
  }
  .tags-dropdown .tag-option{
    display:block;width:100%;background:none;border:none;padding:2px 0;
    cursor:pointer;margin-bottom:4px;
  }
  .tags-dropdown .tag-option img{width:100%;display:block;}
  .tags-dropdown .tag-option.selected img{opacity:0.5;}

  /* ============ STATUS ============ */
  .status-msg{
    margin-top:12px;text-align:center;font-size:13px;
    min-height:20px;color:var(--text-muted);
  }
  .status-msg.ok{color:#2f5a2f;}
  .status-msg.err{color:#8a1f1f;}

  .spinner{
    display:inline-block;width:14px;height:14px;
    border:2px solid var(--text-muted);
    border-top-color:var(--text-dark);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    vertical-align:middle;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes spinPulse{
    0%{transform:rotate(0deg) scale(1);opacity:0.7;}
    50%{transform:rotate(180deg) scale(1.15);opacity:1;}
    100%{transform:rotate(360deg) scale(1);opacity:0.7;}
  }
  @keyframes fadeSlideUp{
    from{opacity:0;transform:translateY(18px);}
    to{opacity:1;transform:translateY(0);}
  }
  .fade-in{animation:fadeSlideUp 0.45s ease-out both;}
  .fade-in-fast{animation:fadeSlideUp 0.3s ease-out both;}
  .page-transition{
    position:fixed;inset:0;background:var(--page-bg);
    display:flex;align-items:center;justify-content:center;z-index:9999;
    opacity:1;transition:opacity 0.35s ease;
  }
  .page-transition.hidden{opacity:0;pointer-events:none;}
  .page-transition .pt-spinner{
    width:48px;height:48px;
    border:4px solid rgba(169,155,120,0.25);
    border-top-color:var(--card-border);
    border-right-color:var(--text-muted);
    border-radius:50%;
    animation:spinPulse 1s ease-in-out infinite;
    box-shadow:0 0 18px rgba(169,155,120,0.25);
  }

  /* ============ OVERLAY DE CARGA ============ */
  .loading-overlay{
    position:fixed;inset:0;
    background:rgba(0,0,0,0.55);
    display:none;
    align-items:center;justify-content:center;
    flex-direction:column;gap:16px;
    z-index:900;
  }
  .loading-overlay.open{display:flex;}
  .loading-overlay .big-spinner{
    width:56px;height:56px;
    border:4px solid rgba(255,255,255,0.15);
    border-top-color:#c2b59b;
    border-right-color:rgba(255,255,255,0.4);
    border-radius:50%;
    animation:spinPulse 1s ease-in-out infinite;
    box-shadow:0 0 24px rgba(0,0,0,0.3), 0 0 20px rgba(194,181,155,0.2);
  }
  .loading-overlay .loading-text{
    color:#fff;font-size:14px;letter-spacing:0.5px;
  }

  /* ============ MODAL DE CONFIRMACIÓN ============ */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.5);
    display:none;align-items:center;justify-content:center;
    z-index:500;padding:20px;
  }
  .overlay.open{display:flex;}
  .overlay-box{
    background:var(--card-bg);
    border:3px solid var(--card-border);
    border-radius:6px;
    padding:28px 32px;
    max-width:380px;width:100%;
    text-align:center;
  }
  .overlay-message{
    font-size:15px;line-height:1.5;color:var(--text-dark);margin-bottom:20px;
  }
  .overlay-actions{display:flex;justify-content:center;gap:40px;}
  .overlay-link{
    font-family:inherit;font-size:18px;cursor:pointer;
    background:none;border:none;padding:0;
    text-decoration:underline;text-decoration-style:dotted;
  }
  .overlay-link.yes{color:#1a4fb5;}
  .overlay-link.no{color:var(--admin-color);}

  /* ============ BADGE DE ESTADO (aprobación) ============ */
  .status-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:5px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:bold;
    margin-bottom:12px;
  }
  .status-badge.pendiente{background:#f6e7b8;color:#8a6d1a;border:1px solid #d9c06a;}
  .status-badge.aprobado{background:#d8f0d6;color:#2c6e2c;border:1px solid #9bd19b;}
  .status-badge.rechazado{background:#f6d8d8;color:#9a2c2c;border:1px solid #d99b9b;}
  .status-badge .dot{width:9px;height:9px;border-radius:50%;background:currentColor;}

  /* ============ ÁREA DE ENVÍO A REVISIÓN ============ */
  .submit-register{
    display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:18px;
  }
  .submit-register .cooldown-msg{font-size:12px;color:var(--text-muted);text-align:center;}
  .btn-send-register{
    padding:10px 22px;
    background:var(--card-border,#a99b78);
    color:#fff;border:none;border-radius:10px;
    font-family:inherit;font-size:15px;font-weight:bold;cursor:pointer;
  }
  .btn-send-register:disabled{filter:grayscale(0.6);cursor:not-allowed;opacity:0.7;}

  /* ============ RESPONSIVE ============ */
  @media(max-width:680px){
    .hotbar{justify-content:center;text-align:center;padding:12px 14px;gap:12px;}

/* ============================================================
   INIT
   ============================================================ */
let authHandled = false;

async function applySession(session){
  if(session){
    currentUser = session.user;
    showLoadingView();
    const start = Date.now();
    await loadProfile();
    const elapsed = Date.now() - start;
    if(elapsed < 800) await new Promise(r => setTimeout(r, 800 - elapsed));
    showProfileView();
  } else {
    currentUser = null;
    showLoginView();
  }
}

async function init(){
  buildTagsDropdown();
  buildSkillsDropdown();
  setTodayDate();
  buildThemeButtons();
  setupListeners();

  // Reaccionar a cambios de sesión (login, logout, refresh de token).
  db.auth.onAuthStateChange(async (_event, session) => {
    authHandled = true;
    if(isEditing) return; // no recargar la vista mientras se edita
    try{
      await applySession(session);
    }catch(err){
      console.error('[onAuthStateChange]', err);
    }
  });

  try{
    const { data: { session }, error } = await db.auth.getSession();
    if(error) throw error;
    // Si onAuthStateChange ya resolvió, no dupliquemos el trabajo.
    if(!authHandled){
      await applySession(session);
    }
  } catch(err){
    console.error('[init]', err);
    showStatus('Error de conexión: ' + (err.message || err), 'err');
    showLoginView();
  }
}

async function loadProfile(){
  try{
    // Cargar perfil
    const { data: prof, error: ep } = await db
      .from('profiles').select('*').eq('id', currentUser.id).single();
    if(ep && ep.code !== 'PGRST116') throw ep;
    currentProfile = prof;

    // ¿Es admin? Usamos la RPC que ya está en la BD.
    try{
      const { data: isAdm } = await db.rpc('is_admin');
      isAdmin = !!isAdm;
    } catch(_){
      // Fallback: mirar el rol del perfil
      isAdmin = currentProfile?.role === 'admin';
    }

    // Cargar personaje del usuario
    const { data: chars, error: ec } = await db
      .from('characters').select('*').eq('owner_id', currentUser.id);
    if(ec) throw ec;
    currentCharacter = (chars && chars.length) ? chars[0] : null;
    currentStatus = currentCharacter?.status || 'pendiente';
    lastSubmit   = currentCharacter?.last_submit || null;

    renderHeader();
    renderProfile();
    renderStatusBadge();
  } catch(err){
    console.error('[loadProfile]', err);
    showStatus('Error al cargar perfil: ' + (err.message || err), 'err');
  }
}

  const username = currentProfile?.username || currentUser.email?.split('@')[0] || 'Usuario';

    badge.style.marginLeft = '8px';
    userInfo.appendChild(badge);
  }
}

  // Datos de solo lectura (siempre se llenan desde la BD)
  $('f-name').value   = ch.name   || '';
  $('f-age').value    = ch.age    || '';
  $('f-rank').value   = ch.rank   || '';

  $('f-clan').value   = ch.clan || '';

  $('f-card-bg').value     = ch.card_bg     || '#fdfbf7';

  $('f-card-text').value   = ch.card_text   || '#3a2e1e';
  $('f-card-font').value   = ch.card_font   || 'Courier New';
  $('discord-display').textContent = currentProfile?.username ? '@' + currentProfile.username : '—';

  const skills = ch.skills || [];
  [1,2].forEach(n=>{
    const slot = $('skill-slot-'+n);

    if(skills[n-1]){

      slot.classList.add('has-img');

      slot.classList.remove('has-img');

const STATUS_LABELS = {
  pendiente: 'Pendiente de aprobación',
  aprobado:  'Aprobado',
  rechazado: 'Rechazado',
};

function renderStatusBadge(){
  const badge = $('status-badge');
  const txt   = $('status-text');
  const wrap  = $('submit-register');
  const cd    = $('cooldown-msg');
  if(!badge) return;

  badge.className = 'status-badge ' + currentStatus;
  badge.style.display = 'inline-flex';
  let label = STATUS_LABELS[currentStatus] || 'Pendiente';
  if(currentStatus === 'rechazado' && currentCharacter?.reject_reason){
    label += ': ' + currentCharacter.reject_reason;
  }
  txt.textContent = label;

  // El área de abajo solo se usa para avisar del cooldown (usuario normal).
  if(wrap && cd){
    const canSend = canResubmit();
    if(isAdmin || canSend){
      wrap.style.display = 'none';
    } else {
      wrap.style.display = 'flex';
      cd.textContent = 'Debes esperar ' + daysLeftCooldown() + ' día(s) para volver a enviar tu registro.';
    }
  }
}

// ¿Han pasado 3 días desde el último envío?
function canResubmit(){
  // Si está pendiente, no puede re-enviar (ya está en revisión).
  if(currentStatus === 'pendiente') return false;
  // Si fue rechazado, puede re-enviar libre (sin cooldown).
  if(currentStatus === 'rechazado') return true;
  // Si está aprobado, espera 3 días para volver a enviar.
  if(!lastSubmit) return true;
  const diffMs = Date.now() - new Date(lastSubmit).getTime();
  return diffMs >= 3 * 24 * 60 * 60 * 1000;
}

function daysLeftCooldown(){
  if(!lastSubmit) return 0;
  const elapsed = Date.now() - new Date(lastSubmit).getTime();
  const left = Math.ceil((3 * 24 * 60 * 60 * 1000 - elapsed) / (24 * 60 * 60 * 1000));
  return Math.max(0, left);
}

function setTodayDate(){
  const d = new Date();
  const fmt = String(d.getDate()).padStart(2,'0')+'/'+
              String(d.getMonth()+1).padStart(2,'0')+'/'+
              String(d.getFullYear()).slice(-2);
  $('fecha-display').textContent = fmt;
}

  };

  // Habilitar inputs. Con el sistema de aprobación, el usuario normal
  // ahora también llena edad/rango/zodiaco/clan; el mod solo aprueba.
  const idsToEnable = ['f-name','f-age','f-rank','f-zodiac','f-bio'];

  idsToEnable.forEach(id=>{
    const el = $(id);
    el.removeAttribute('readonly');
    el.disabled = false;
    const box = el.closest('.field-value, .bio-box');
    if(box) box.classList.remove('readonly');
  });

  // Skills editables para todos
  [1,2].forEach(n=>{
    $('skill-slot-'+n).classList.add('editable');
  });

  // Tag editable para todos
  $('btn-select-tag').disabled = false;

  // Foto clickable para todos
  $('photo-box').classList.add('editable');

  // Clan: menú con iconos editable por cualquiera al editar.
  $('clan-display').classList.add('editable');
  updateClanIcon();

  // Cambiar botones
  $('btn-row-view').classList.add('hidden');
  $('btn-row-edit').classList.remove('hidden');

  showStatus('Editando… hace tus cambios y dale a "Guardar"', '');
}

function exitEditMode(save=false){
  isEditing = false;

  // Deshabilitar inputs
  ['f-name','f-age','f-rank','f-zodiac','f-bio'].forEach(id=>{
    const el = $(id);
    el.setAttribute('readonly','');
    const box = el.closest('.field-value, .bio-box');
    if(box) box.classList.add('readonly');
  });

  // Cerrar el menú de clanes y quitar el modo editable
  $('clan-display').classList.remove('editable');
  $('clan-dropdown').classList.remove('open');

  [1,2].forEach(n=>{
    $('skill-slot-'+n).classList.remove('editable');
  });
  $('btn-select-tag').disabled = true;
  $('photo-box').classList.remove('editable');
  closeAllPanels();

  // Restaurar si canceló
  if(!save && originalData){
    $('f-name').value = originalData.name;
    $('f-age').value = originalData.age;
    $('f-rank').value = originalData.rank;
    $('f-zodiac').value = originalData.zodiac;
    $('f-clan').value = originalData.clan;
    $('f-bio').value = originalData.bio;
    $('f-card-bg').value     = originalData.card_bg     || '#fdfbf7';
    $('f-card-border').value = originalData.card_border || '#c2b59b';
    $('f-card-text').value   = originalData.card_text   || '#3a2e1e';
    $('f-card-font').value   = originalData.card_font   || 'Courier New';
    selectedTag = originalData.tag;
    if(currentCharacter){
      currentCharacter.skills = originalData.skills;
      currentCharacter.portrait_info = originalData.photo;
    }
    renderProfile();
  }

  $('btn-row-edit').classList.add('hidden');
  $('btn-row-view').classList.remove('hidden');
  updateClanIcon();
  showStatus('', '');
}

/* ============================================================
   ENVIAR REGISTRO A REVISIÓN (sistema de aprobación)
   ============================================================ */
async function sendToReview(){
  if(!currentCharacter){
    showStatus('No hay personaje vinculado a tu cuenta.', 'err');
    return;
  }
  if(!canResubmit()){
    showStatus('Debes esperar ' + daysLeftCooldown() + ' día(s) para volver a enviar.', 'err');
    renderStatusBadge();
    return;
  }

  // Recolectar datos actuales del formulario (puede no haber entrado a editar).
  const updates = collectProfileUpdates();

  showStatus('<span class="spinner"></span>Enviando a revisión…', '');
  $('loading-overlay').classList.add('open');

  const now = new Date().toISOString();
  const changes = {
    ...updates,
    status: 'pendiente',
    last_submit: now,
    reviewed_by: null,
    reviewed_at: null,
    reject_reason: null,
  };

  let error;
  if(currentCharacter.id){
    const r = await db.from('characters').update(changes).eq('id', currentCharacter.id);
    error = r.error;
  } else {
    const r = await db.from('characters').insert({
      ...changes,
      owner_id: currentUser.id,
      category: 'Kages',
      name: changes.name || 'Sin nombre',
    }).select('id').single();
    error = r.error;
    if(!error && r.data) currentCharacter.id = r.data.id;
  }

  $('loading-overlay').classList.remove('open');
  if(error){
    showStatus('Error al enviar: ' + error.message, 'err');
    return;
  }

  currentCharacter = { ...currentCharacter, ...changes };
  currentStatus = 'pendiente';
  lastSubmit = now;
  if(isEditing) exitEditMode(true);
  renderStatusBadge();
  showStatus('¡Registro enviado a revisión! Un moderador lo revisará pronto.', 'ok');

  // Avisar a Discord: pendiente
  notifyDiscord(updates, false, 'pendiente');
}

// Recoge los campos editables del formulario (igual que saveProfile).
function collectProfileUpdates(){
  let currentSkills = (currentCharacter?.skills || []).filter(Boolean);
  if(currentSkills.length === 0){
    [1,2].forEach(n=>{
      const img = document.querySelector('#skill-slot-'+n+' img.skill-img');
      if(img && img.src && img.src !== '') currentSkills.push(img.src);
    });
  }
  return {
    bio: $('f-bio').value.trim(),
    skills: currentSkills,
    modes: selectedTag ? [selectedTag] : [],
    portrait_info: currentCharacter?.portrait_info || null,
    portrait_list: currentCharacter?.portrait_info || null,
    is_wiki: false,
    name: $('f-name').value.trim(),
    age:    (()=>{ const v=$('f-age').value.trim(); return v==='' ? null : parseInt(v,10); })(),
    rank:   $('f-rank').value.trim() || null,
    zodiac: $('f-zodiac').value.trim() || null,
    clan:   $('f-clan').value || null,
  };
}

/* ============================================================
   GUARDAR
   ============================================================ */
async function saveProfile(){
  if(!currentCharacter){
    showStatus('No hay personaje vinculado a tu cuenta.', 'err');
    return;
  }

  // Usuario normal: respetar reglas de envío (pendiente = bloqueado,
  // aprobado = cooldown 3 días, rechazado = libre).
  if(!isAdmin){
    if(currentStatus === 'pendiente'){
      showStatus('Ya enviaste tu registro y está en revisión. Espera a que un moderador lo apruebe o rechace.', 'err');
      return;
    }
    if(currentStatus === 'aprobado' && !canResubmit()){
      showStatus('Debes esperar ' + daysLeftCooldown() + ' día(s) para volver a enviar tu registro.', 'err');
      return;
    }
  }

  const updates = collectProfileUpdates();

  // El mod/admin guarda libre; el usuario normal manda a revisión (pendiente).
  if(!isAdmin){
    updates.status = 'pendiente';
    updates.last_submit = new Date().toISOString();
    updates.reviewed_by = null;
    updates.reviewed_at = null;
    updates.reject_reason = null;
  }

  showStatus('<span class="spinner"></span>Guardando…', '');
  $('loading-overlay').classList.add('open');
  let error, data;
  const esNuevo = !currentCharacter.id;

  if(currentCharacter.id){
    // Actualizar personaje existente
    const r = await db.from('characters')
      .update(updates).eq('id', currentCharacter.id);
    error = r.error;
  } else {
    // Crear personaje nuevo
    const insertData = {
      ...updates,
      owner_id: currentUser.id,
      category: 'Kages',
      name: updates.name || 'Sin nombre',
      status: 'pendiente',
      last_submit: new Date().toISOString(),
    };
    const r = await db.from('characters')
      .insert(insertData).select('id').single();
    error = r.error;
    data = r.data;
    if(!error && data){
      currentCharacter.id = data.id;
      currentStatus = 'pendiente';
      lastSubmit = insertData.last_submit;
    }
  }

  $('loading-overlay').classList.remove('open');

  if(error){
    showStatus('Error al guardar: ' + error.message, 'err');
    return;
  }
  currentCharacter = { ...currentCharacter, ...updates };
  if(!isAdmin){
    currentStatus = 'pendiente';
    lastSubmit = updates.last_submit;
  }
  renderStatusBadge();

  if(isAdmin){
    showStatus('¡Cambios guardados!', 'ok');
    exitEditMode(true);
    notifyDiscord(updates, esNuevo);
  } else {
    showStatus('¡Registro enviado a revisión! Un moderador lo revisará pronto.', 'ok');
    exitEditMode(true);
    notifyDiscord(updates, esNuevo, 'pendiente');
  }
}

/* ============================================================
   AVISO A DISCORD (webhook) — cada vez que se guarda el perfil
   ============================================================ */
function dataURLtoBlob(dataURL){
  const parts = dataURL.split(',');
  const mimeMatch = parts[0].match(/data:([^;]+)/);
  const mime = mimeMatch ? mimeMatch[1] : 'image/png';
  const binary = atob(parts[1]);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++){ bytes[i] = binary.charCodeAt(i); }
  return new Blob([bytes], { type: mime });
}

async function notifyDiscord(updates, esNuevo, estado){  // estado: pendiente|aprobado|rechazado|undefined
  try{
    const name  = (updates.name || 'Sin nombre');
    const foto  = updates.portrait_info || null;
    const autor = currentProfile?.username || currentUser?.email || 'Usuario';

    let prefijo = esNuevo ? 'Nuevo Perfil' : 'Perfil Actualizado';
    if(estado === 'pendiente') prefijo = '🟡 Registro Pendiente';
    else if(estado === 'aprobado') prefijo = '✅ Registro Aprobado';
    else if(estado === 'rechazado') prefijo = '🔴 Registro Rechazado';

    const titulo = prefijo;
    const mensaje = `**${titulo}:** ${name}\nPor: ${autor}`;

    // Capturar la ficha completa como imagen (como el Registro Civil de antes).
    let blob = null;
    try{
      const card = $('profile-card');
      if(card && typeof html2canvas === 'function'){
        const canvas = await html2canvas(card, {
          backgroundColor: '#f6f2e6',
          scale: 3,
          useCORS: true,
          logging: false,
          width: 620,
          windowWidth: 900,
          onclone: (doc)=>{
            const c = doc.getElementById('profile-card');
            if(c){
              // Ficha compacta (más cuadrada) => el preview de Discord muestra
              // el contenido más grande y legible sin abrir la imagen.
              c.style.width = '620px';
              c.style.maxWidth = '620px';
              c.style.gridTemplateColumns = '1fr 1fr';
              c.style.gap = '14px';
              c.style.padding = '16px';
            }
            // Evitar que html2canvas estire la imagen del clan: forzar proporción.
            const ci = doc.getElementById('clan-icon');
            if(ci){
              ci.style.width = 'auto';
              ci.style.maxWidth = '100%';
              ci.style.height = '56px';
              ci.style.objectFit = 'contain';
              ci.style.margin = '0 auto';
              ci.style.display = 'block';
            }
            const cd = doc.getElementById('clan-display');
            if(cd){
              cd.style.display = 'flex';
              cd.style.justifyContent = 'center';
              cd.style.alignItems = 'center';
            }
            // Agrandar el texto de la ficha para mejor lectura en el preview.
            if(c){
              c.querySelectorAll('label').forEach(el=>{ el.style.fontSize = '14px'; });
              c.querySelectorAll('input, textarea, .field-value, .field-value input, .field-value textarea')
                .forEach(el=>{ el.style.fontSize = '16px'; });
            }
          },
        });
        blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
      }
    }catch(e){ console.error('[notifyDiscord] captura ficha', e); blob = null; }

    // Fallback: si no se pudo capturar la ficha, mandar solo la foto.
    if(!blob && foto){
      try{
        blob = foto.startsWith('data:') ? dataURLtoBlob(foto) : await (await fetch(foto)).blob();
      }catch(e){ console.error('[notifyDiscord] foto->blob', e); blob = null; }
    }
    console.log('[notifyDiscord] blob:', blob && blob.size);

    if(blob){
      const fileName = 'perfil_' + name.replace(/[^a-zA-Z0-9_-]/g,'_') + '.png';
      // Imagen como archivo directo => Discord la muestra en grande (sin embed).
      const formData = new FormData();
      formData.append('payload_json', JSON.stringify({ content: mensaje }));
      formData.append('files[0]', blob, fileName);
      await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
    } else {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: mensaje }),
      });
    }
  }catch(err){
    // El aviso a Discord no debe romper el guardado.
    console.error('[notifyDiscord]', err);
  }
}

function buildSkillsDropdown(){
  const panel = $('skills-dropdown');
  SKILL_OPTIONS.forEach(opt=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'skill-option';
    btn.innerHTML =
      `<img src="${opt.image}" alt="${opt.name}" />` +
      `<span>${opt.name}</span>`;

      e.stopPropagation();
      selectSkill(currentSkillSlot, opt.image);
      closeAllPanels();
    });
    panel.appendChild(btn);
  });
}

function selectSkill(slotNum, imagePath){
  if(!currentCharacter) currentCharacter = {};
  if(!currentCharacter.skills) currentCharacter.skills = [];
  currentCharacter.skills[slotNum-1] = imagePath;
  // re-render solo skills
  const skills = currentCharacter.skills;
  [1,2].forEach(n=>{
    const slot = $('skill-slot-'+n);
    const img = slot.querySelector('img.skill-img');
    if(skills[n-1]){
      img.src = skills[n-1];
      slot.classList.add('has-img');
    } else {
      slot.classList.remove('has-img');
      img.removeAttribute('src');
    }
  });
}

function buildTagsDropdown(){
  const panel = $('tags-dropdown');
  TAG_OPTIONS.forEach(opt=>{

$('photo-box').addEventListener('click', ()=>{
  if(!isEditing) return;
  // crea un input file temporal y ábrelo
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024){
      showStatus('La imagen pesa más de 2MB.', 'err');
      return;
    }
    const reader = new FileReader();
    reader.onload = ev=>{
      const src = ev.target.result;
      $('photo-img').src = src;
      $('photo-box').classList.add('has-img');
      if(currentCharacter) currentCharacter.portrait_info = src;
    };
    reader.readAsDataURL(file);
  };
  input.click();
});

function selectClan(value){
  $('f-clan').value = value;
  updateClanIcon();
  $('clan-dropdown').classList.remove('open');
}

function updateClanIcon(){
  const icon = $('clan-icon');
  const box = $('clan-display');
  const ph  = $('clan-placeholder');
  if(!icon || !box) return;
  const val = $('f-clan').value;
  const src = CLAN_IMAGES[val];
  // marcar la opción activa en el panel
  $('clan-dropdown').querySelectorAll('.clan-option').forEach(o=>{
    o.classList.toggle('selected', o.dataset.value === val);
  });
  if(src){
    icon.src = src;
    icon.alt = val;
    icon.style.display = 'block';
    if(ph) ph.style.display = 'none';
    box.classList.add('has-clan');
  } else {
    icon.removeAttribute('src');
    icon.style.display = 'none';
    if(ph) ph.style.display = 'block';
    box.classList.remove('has-clan');
  }
}

  const el = $('status-msg');
  el.className = 'status-msg' + (type ? ' ' + type : '');
  el.innerHTML = msg;
}

/* ============================================================
   ARRANQUE
   ============================================================ */
init();
</script>

<!-- Overlay de carga al guardar -->
<div class="loading-overlay" id="loading-overlay">
  <div class="big-spinner"></div>
  <div class="loading-text">Guardando…</div>
</div>

<script>
document.querySelectorAll('.nav-link').forEach(a => {
  a.addEventListener('click', function(e){
    if(this.hostname === location.hostname){
      e.preventDefault();
      document.getElementById('page-transition').classList.remove('hidden');
      setTimeout(() => { location.href = this.href; }, 350);
    }
  });
});
window.addEventListener('load', function(){
  setTimeout(function(){
    document.getElementById('page-transition').classList.add('hidden');
  }, 200);
});
</script>

</body>
</html>

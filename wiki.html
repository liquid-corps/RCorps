<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki</title>
<style>
  /* ============================================================
     FUENTE LOCAL (misma que index.html)
     Requiere el archivo PixelArial11.ttf en la misma carpeta.
     ============================================================ */
  @font-face{
    font-family:'Pixel Arial 11';
    src:url('PixelArial11.ttf') format('truetype');
    font-weight:normal;
    font-style:normal;
    font-display:swap;
  }
</style>
<style>
  :root{
    --page-bg:#f1eee4;
    --panel-border:#b8ae95;
    --text-dark:#3a332a;
    --text-muted:#a49c8c;
    --maroon:#7a2020;
    --blue:#4a6fa5;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--page-bg);
    font-family:'Pixel Arial 11', monospace;
    color:var(--text-dark);
    min-height:100vh;
  }

  /* ============ HOTBAR ============ */
  .hotbar{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:space-between;
    height:78px;
    padding:0 34px;
    background-image:url('assets/hotbar.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
  }
  .hotbar-nav{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:22px;
  }
  .hotbar-nav a{
    color:var(--text-dark);
    text-decoration:none;
  }
  .hotbar-nav a:hover{opacity:0.75;}
  .hotbar-nav .sep{color:var(--text-muted);}

  .search-wrap{position:relative;width:420px;}
  .search-bar{
    display:flex;
    align-items:center;
    width:100%;
    height:42px;
    padding:0 16px;
    background-image:url('assets/barra_busqueda.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
  }
  .search-bar input{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    font-family:inherit;
    font-size:18px;
    color:var(--text-dark);
  }
  .search-bar input::placeholder{color:var(--text-muted);}
  .search-bar .search-icon{
    color:var(--text-muted);
    font-size:18px;
    margin-left:8px;
  }

  /* ---- sugerencias flotantes bajo la barra de búsqueda ---- */
  .search-suggestions{
    position:absolute;
    top:calc(100% + 6px);
    right:0;
    width:100%;
    z-index:120;
    display:none;
  }
  .search-suggestions.open{display:block;}
  .suggestion-card{
    background:#f3f0e6;
    border:1px solid var(--panel-border);
    padding:12px 16px;
    margin-top:-1px;
    cursor:pointer;
    box-shadow:0 6px 10px rgba(0,0,0,0.08);
  }
  .suggestion-card:hover{background:#eae5d5;}
  .suggestion-card .s-title{font-size:16px;}
  .suggestion-card .s-title .s-date{font-size:11px;color:var(--text-muted);margin-left:8px;}
  .suggestion-card .s-snippet{font-size:13px;color:var(--text-muted);margin-top:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ============ LAYOUT PRINCIPAL ============ */
  .wiki-layout{
    display:flex;
    align-items:flex-start;
    gap:40px;
    padding:40px;
    max-width:1500px;
    margin:0 auto;
  }

  /* ---- Panel de artículos (izquierda) ---- */
  .articles-col{width:360px;flex-shrink:0;}
  .search-label{
    font-size:13px;
    color:var(--text-muted);
    margin-bottom:8px;
  }
  .articles-panel{
    background-image:url('assets/panel_articulos.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:14px;
    max-height:78vh;
    overflow-y:auto;
  }
  .articulo-box{
    position:relative;
    background-image:url('assets/articulos_cuadro.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:14px 16px;
    margin-bottom:14px;
    cursor:pointer;
  }
  .articulo-box:last-child{margin-bottom:0;}
  .articulo-title-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:6px;
  }
  .articulo-title-row h3{
    margin:0;
    font-size:20px;
    font-weight:normal;
  }
  .articulo-title-row .articulo-date{
    font-size:12px;
    color:var(--text-muted);
  }
  .articulo-snippet{
    font-size:14px;
    line-height:1.35;
    color:var(--text-muted);
    display:-webkit-box;
    -webkit-line-clamp:5;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .articulo-badge{
    position:absolute;
    top:-10px;
    right:14px;
    height:24px;
    width:auto;
  }
  .no-results{
    padding:20px;
    color:var(--text-muted);
    font-size:14px;
  }

  /* ---- Panel de contenido (derecha) ---- */
  .content-panel{
    flex:1;
    min-height:78vh;
    background-image:url('assets/panel_contenido.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:34px;
  }
  .content-placeholder{
    font-size:18px;
    color:var(--text-dark);
  }
  .content-cover{
    width:100%;
    height:220px;
    background-size:cover;
    background-position:center;
    margin-bottom:22px;
  }
  .content-cover:empty{display:none;margin-bottom:0;}
  #content-title{
    margin:0 0 16px 0;
    font-size:26px;
    font-weight:normal;
    color:var(--text-dark);
  }
  .content-text{
    font-size:15px;
    line-height:1.6;
    color:var(--text-muted);
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .content-footer{
    margin-top:26px;
    display:flex;
    flex-direction:column;
    gap:4px;
    font-size:12px;
    color:var(--text-muted);
  }

  /* ============ EDITOR / PUBLICAR (modo secreto) ============ */
  .editor-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(60,55,45,0.45);
    z-index:200;
    align-items:flex-start;
    justify-content:center;
    padding-top:90px;
  }
  .editor-overlay.open{display:flex;}
  .editor-wrap{width:640px;max-width:92vw;}
  .periodico-pill{
    display:inline-block;
    background:#f6f2e6;
    border:1px solid var(--panel-border);
    padding:10px 40px;
    font-size:15px;
    color:var(--text-muted);
    margin:0 auto 16px auto;
    text-align:center;
    width:100%;
    cursor:default;
  }
  .editor-card{
    background:#f6f2e6;
    border:1px solid var(--panel-border);
    padding:26px;
  }
  .editor-card h3{
    margin:0 0 18px 0;
    font-size:22px;
    font-weight:normal;
  }
  .editor-row{margin-bottom:14px;}
  .editor-row label{
    display:block;
    font-size:12px;
    color:var(--text-muted);
    margin-bottom:4px;
  }
  .editor-row input[type=text],
  .editor-row textarea{
    width:100%;
    font-family:inherit;
    font-size:15px;
    color:var(--text-dark);
    background:#fff;
    border:1px solid var(--panel-border);
    padding:8px 10px;
    outline:none;
    resize:vertical;
  }
  .editor-row textarea{min-height:120px;}
  .upload-btn{
    display:block;
    width:100%;
    text-align:center;
    background:#fff;
    border:1px solid var(--panel-border);
    padding:14px;
    font-size:14px;
    color:var(--text-muted);
    cursor:pointer;
  }
  .upload-btn:hover{background:#faf8f2;}
  .upload-btn input{display:none;}
  .upload-hint{font-size:11px;color:var(--text-muted);margin-top:4px;}
  .editor-actions{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:22px;
  }
  .editor-actions button{
    background:#fff;
    border:1px solid var(--panel-border);
    padding:10px 30px;
    font-family:inherit;
    font-size:15px;
    color:var(--text-dark);
    cursor:pointer;
  }
  .editor-actions button:hover{background:#f0ecdf;}
  .editor-status{
    text-align:center;
    font-size:13px;
    color:var(--maroon);
    margin-top:12px;
    min-height:16px;
  }
</style>
</head>

<script>
const $ = id => document.getElementById(id);

/* ------------------------------------------------------------------
   Config
------------------------------------------------------------------ */
const STORAGE_KEY = 'wikiArticles_v2'; // v2: las vistas de muestra ya no son inventadas
const NEW_TAG_MS = 3 * 60 * 60 * 1000;         // "NEW!" dura 3 horas
const TOP_VIEW_THRESHOLD = 100;                 // "TOP" si supera 100 vistas
const TOP_WINDOW_MS = 7 * 24 * 60 * 60 * 1000;  // ...durante 1 semana
const SECRET_CODE = 'a3a#HGD#LNLBw7s';          // código secreto para publicar
const MAX_COVER_CHARS = 35000;                  // límite de tamaño de portada (celda de Sheets)

/* ============================================================
   BASE DE DATOS COMPARTIDA (Google Sheets + Apps Script)
   ============================================================
   Sin esto, cada artículo publicado solo se guarda en el
   navegador de quien lo publicó (localStorage) y nadie más lo ve.
   Para que TODOS los visitantes vean los mismos artículos,
   guardados en una hoja de Google Sheets:

   1. Crea una hoja nueva en https://sheets.google.com
   2. En la fila 1, escribe exactamente estos encabezados, uno por
      columna (A a I):
        id | title | dateStr | text | cover | publishedAt | views | weekViews | weekStart
   3. Menú "Extensiones" -> "Apps Script". Borra el contenido que
      aparece y pega TODO el código de abajo (sección "CÓDIGO PARA
      APPS SCRIPT"). Guarda el proyecto (nómbralo como quieras).
   4. Arriba a la derecha, botón "Implementar" -> "Nueva implementación".
      - Tipo: "Aplicación web".
      - Ejecutar como: "Yo".
      - Quién tiene acceso: "Cualquier usuario".
      -> "Implementar". La primera vez te pedirá autorizar permisos
      (es tu propio script, es seguro aceptar).
   5. Copia la URL que termina en /exec y pégala aquí abajo,
      reemplazando "PON_AQUI_TU_URL_DE_APPS_SCRIPT".

   Mientras no reemplaces "PON_AQUI...", la wiki sigue funcionando
   como antes (guardado solo en tu propio navegador).

   ------------------------------------------------------------------
   CÓDIGO PARA APPS SCRIPT (pégalo completo en el editor de Apps Script)
   ------------------------------------------------------------------

   function doGet(e) {
     var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheets()[0];
     var data = sheet.getDataRange().getValues();
     var headers = data.shift();
     var articles = data
       .filter(function(row){ return row[0] !== ''; })
       .map(function(row){
         var obj = {};
         headers.forEach(function(h, i){ obj[h] = row[i]; });
         return obj;
       });
     return ContentService.createTextOutput(JSON.stringify(articles))
       .setMimeType(ContentService.MimeType.JSON);
   }

   function doPost(e) {
     var lock = LockService.getScriptLock();
     lock.waitLock(10000);
     try {
       var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheets()[0];
       var headers = sheet.getDataRange().getValues()[0];
       var body = JSON.parse(e.postData.contents);

       if (body.action === 'publish') {
         var id = Utilities.getUuid();
         var now = Date.now();
         var row = headers.map(function(h){
           switch (h) {
             case 'id': return id;
             case 'title': return body.title || 'SIN TITULO';
             case 'dateStr': return body.dateStr || '';
             case 'text': return body.text || '';
             case 'cover': return body.cover || '';
             case 'publishedAt': return now;
             case 'views': return 0;
             case 'weekViews': return 0;
             case 'weekStart': return now;
             default: return '';
           }
         });
         sheet.appendRow(row);
         return ContentService.createTextOutput(JSON.stringify({ ok: true, id: id }))
           .setMimeType(ContentService.MimeType.JSON);
       }

       if (body.action === 'view') {
         var data = sheet.getDataRange().getValues();
         var idCol = headers.indexOf('id');
         var viewsCol = headers.indexOf('views');
         var weekViewsCol = headers.indexOf('weekViews');
         var weekStartCol = headers.indexOf('weekStart');
         for (var i = 1; i < data.length; i++) {
           if (String(data[i][idCol]) === String(body.id)) {
             var now = Date.now();
             var weekStart = Number(data[i][weekStartCol]) || now;
             var weekViews = Number(data[i][weekViewsCol]) || 0;
             if (now - weekStart > 7 * 24 * 60 * 60 * 1000) {
               weekStart = now;
               weekViews = 0;
             }
             sheet.getRange(i + 1, viewsCol + 1).setValue((Number(data[i][viewsCol]) || 0) + 1);
             sheet.getRange(i + 1, weekViewsCol + 1).setValue(weekViews + 1);
             sheet.getRange(i + 1, weekStartCol + 1).setValue(weekStart);
             break;
           }
         }
         return ContentService.createTextOutput(JSON.stringify({ ok: true }))
           .setMimeType(ContentService.MimeType.JSON);
       }

       return ContentService.createTextOutput(JSON.stringify({ ok: false, error: 'accion desconocida' }))
         .setMimeType(ContentService.MimeType.JSON);
     } finally {
       lock.releaseLock();
     }
   }
   ------------------------------------------------------------------
   ============================================================ */
const SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbxGGg4hBx0fpwn1_9HWCL7Vta9_um_itp7rO2uHKRLfxSqpRKCD-Iq4LYxPdOcmHEPP/exec";
const SHEETS_ENABLED = !SHEETS_API_URL.includes('PON_AQUI');

let articles = [];
let selectedId = null;
let currentQuery = '';

/* ------------------------------------------------------------------
   Datos de ejemplo (solo se usan en modo local, la primera vez)
------------------------------------------------------------------ */
function seedArticles(){
  const now = Date.now();

    {
      id: cryptoId(),

      cover: null,

    },
    {

      text: 'Lucas y Kit fueron al parque, de repente oso baul se aparecio y empezó a ladrar hasta que water llego y le chuzo la barriga para que despues se desinflara y muriera.',
      cover: null,
      publishedAt: now - (100*60*60*1000),
      views: 0,
      weekViews: 0,
      weekStart: now
    },
    {
      id: cryptoId(),
      title: 'SIN TITULO',
      dateStr: '31/12/9999',
      text: 'Lucas y Kit fueron al parque, de repente oso baul se aparecio y empezó a ladrar hasta que water llego y le chuzo la barriga para que despues se desinflara y muriera.',
      cover: null,
      publishedAt: now - (100*60*60*1000),
      views: 0,
      weekViews: 0,
      weekStart: now
    },
    {
      id: cryptoId(),
      title: 'SIN TITULO',
      dateStr: '31/12/9999',
      text: 'Lucas y Kit fueron al parque, de repente oso baul se aparecio y empezó a ladrar hasta que water llego y le chuzo la barriga para que despues se desinflara y muriera.',
      cover: null,
      publishedAt: now - (100*60*60*1000),
      views: 0,
      weekViews: 0,
      weekStart: now
    }
  ];
}

function cryptoId(){
  return 'a' + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

/* ------------------------------------------------------------------
   Persistencia
   - Modo compartido (Firestore): todos los visitantes ven los
     mismos artículos, en tiempo real, para siempre.
   - Modo local (respaldo si no configuraste Firebase): solo en
     el navegador de quien publicó.
------------------------------------------------------------------ */
function loadLocalArticles(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      articles = JSON.parse(raw);
    } else {
      articles = seedArticles();
      saveLocalArticles();
    }
  }catch(e){
    articles = seedArticles();
  }
}
function saveLocalArticles(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(articles)); }
  catch(e){ console.error('No se pudo guardar la wiki', e); }
}

function startArticlesSync(){
  if(SHEETS_ENABLED){
    refreshFromSheet();
    // Google Sheets no empuja cambios en vivo, así que se refresca
    // cada 30s para que aparezcan artículos/vistas de otros visitantes.
    setInterval(refreshFromSheet, 30*1000);
  } else {
    loadLocalArticles();
    renderArticlesList();
  }
}

async function fetchArticlesFromSheet(){
  const res = await fetch(SHEETS_API_URL);
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const data = await res.json();
  return data.map(a => ({
    id: String(a.id),
    title: a.title || 'SIN TITULO',
    dateStr: a.dateStr || '',
    text: a.text || '',
    cover: a.cover || null,
    publishedAt: Number(a.publishedAt) || Date.now(),
    views: Number(a.views) || 0,
    weekViews: Number(a.weekViews) || 0,
    weekStart: Number(a.weekStart) || Date.now()
  })).sort((a, b) => b.publishedAt - a.publishedAt);
}

async function refreshFromSheet(){
  try{
    articles = await fetchArticlesFromSheet();
    renderArticlesList();
    if(selectedId){
      const still = articles.find(a => a.id === selectedId);
      if(still) renderContentOnly(still);
    }
  }catch(e){
    console.error('No se pudo conectar a Google Sheets, usando modo local:', e);
    if(!articles.length){
      loadLocalArticles();
      renderArticlesList();
    }
  }
}

/* ------------------------------------------------------------------
   Lógica de etiquetas NEW! / TOP
------------------------------------------------------------------ */
function isNew(a){
  return (Date.now() - a.publishedAt) < NEW_TAG_MS;
}
function isTop(a){
  // si la ventana de la semana ya venció, se resetea el contador
  if(Date.now() - a.weekStart > TOP_WINDOW_MS){
    a.weekStart = Date.now();
    a.weekViews = 0;
  }
  return a.weekViews > TOP_VIEW_THRESHOLD;
}

/* ------------------------------------------------------------------
   Render: lista de artículos
------------------------------------------------------------------ */
function badgeEl(kind){
  const img = document.createElement('img');
  img.className = 'articulo-badge';
  img.src = kind === 'new' ? 'assets/new_tag.png' : 'assets/top_tag.png';
  img.alt = kind === 'new' ? 'NEW!' : 'TOP';
  return img;
}

function renderArticlesList(){
  const panel = $('articles-panel');
  panel.innerHTML = '';

  let list = articles;
  if(currentQuery){
    const q = currentQuery.toLowerCase();
    list = articles.filter(a =>
      a.title.toLowerCase().includes(q) || a.text.toLowerCase().includes(q)
    );
  }

  if(list.length === 0){
    const div = document.createElement('div');
    div.className = 'no-results';
    div.textContent = 'No se encontraron artículos.';
    panel.appendChild(div);
    return;
  }

  list.forEach(a=>{
    const box = document.createElement('div');
    box.className = 'articulo-box';

    if(isNew(a)) box.appendChild(badgeEl('new'));
    else if(isTop(a)) box.appendChild(badgeEl('top'));

    const row = document.createElement('div');
    row.className = 'articulo-title-row';
    const h3 = document.createElement('h3');
    h3.textContent = a.title || 'SIN TITULO';
    const date = document.createElement('span');
    date.className = 'articulo-date';
    date.textContent = a.dateStr || '';
    row.appendChild(h3);
    row.appendChild(date);

    const snippet = document.createElement('div');
    snippet.className = 'articulo-snippet';
    snippet.textContent = a.text;

    box.appendChild(row);
    box.appendChild(snippet);
    box.addEventListener('click', ()=> selectArticle(a.id));

    panel.appendChild(box);
  });
}

/* ------------------------------------------------------------------
   Render: panel de contenido
------------------------------------------------------------------ */
function renderContentOnly(a){
  $('content-placeholder').style.display = 'none';
  $('content-body').style.display = 'block';

  const cover = $('content-cover');
  if(a.cover){
    cover.style.backgroundImage = `url('${a.cover}')`;
    cover.textContent = '';
  } else {
    cover.style.backgroundImage = '';
    cover.textContent = '';
  }

  $('content-title').textContent = a.title || 'SIN TITULO';
  $('content-text').textContent = a.text;
  $('content-date').textContent = a.dateStr || '';
  $('content-views').textContent = 'Visualizaciones: ' + (a.views || 0);
}

async function registerView(a){
  if(!SHEETS_ENABLED){
    a.views = (a.views || 0) + 1;
    a.weekViews = (a.weekViews || 0) + 1;
    if(Date.now() - a.weekStart > TOP_WINDOW_MS){
      a.weekStart = Date.now();
      a.weekViews = 1;
    }
    saveLocalArticles();
    renderArticlesList();
    return;
  }
  try{
    // text/plain evita el preflight CORS; Apps Script igual lee el
    // JSON crudo desde e.postData.contents.
    await fetch(SHEETS_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'view', id: a.id })
    });
    await refreshFromSheet(); // trae el conteo real, ya sincronizado
  }catch(e){
    console.error('No se pudo registrar la vista', e);
  }
}

function selectArticle(id){
  const a = articles.find(x=>x.id === id);
  if(!a) return;

  selectedId = id;
  // se muestra al instante con +1 vista (feedback inmediato); el conteo
  // real y definitivo llega enseguida por la sincronización en vivo
  renderContentOnly(Object.assign({}, a, { views: (a.views || 0) + 1 }));
  registerView(a);
  renderArticlesList(); // refresca los tags NEW!/TOP
}

/* ------------------------------------------------------------------
   Búsqueda
------------------------------------------------------------------ */
const searchInput = $('search-input');
const suggestionsBox = $('search-suggestions');

function renderSuggestions(query){
  suggestionsBox.innerHTML = '';
  if(!query){
    suggestionsBox.classList.remove('open');
    return;
  }
  const q = query.toLowerCase();
  const matches = articles.filter(a =>
    a.title.toLowerCase().includes(q) || a.text.toLowerCase().includes(q)
  ).slice(0, 3);

  if(matches.length === 0){
    suggestionsBox.classList.remove('open');
    return;
  }

  matches.forEach(a=>{
    const card = document.createElement('div');
    card.className = 'suggestion-card';
    card.innerHTML = `<div class="s-title">${escapeHtml(a.title || 'SIN TITULO')}<span class="s-date">${escapeHtml(a.dateStr||'')}</span></div>
                       <div class="s-snippet">${escapeHtml(a.text)}</div>`;
    card.addEventListener('click', ()=>{
      searchInput.value = a.title;
      runSearch(a.title);
      suggestionsBox.classList.remove('open');
    });
    suggestionsBox.appendChild(card);
  });
  suggestionsBox.classList.add('open');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function runSearch(query){
  currentQuery = query.trim();
  if(currentQuery){
    $('search-label').style.display = 'block';
    $('search-term').textContent = currentQuery;
  } else {
    $('search-label').style.display = 'none';
  }
  renderArticlesList();
}

searchInput.addEventListener('input', (e)=>{
  renderSuggestions(e.target.value.trim());
});

searchInput.addEventListener('keydown', (e)=>{
  if(e.key !== 'Enter') return;
  const val = searchInput.value.trim();

  // Código secreto para abrir el panel de publicación
  if(val === SECRET_CODE){
    searchInput.value = '';
    suggestionsBox.classList.remove('open');
    openEditor();
    return;
  }

  suggestionsBox.classList.remove('open');
  runSearch(val);
});

document.addEventListener('click', (e)=>{
  if(!e.target.closest('.search-wrap')) suggestionsBox.classList.remove('open');
});

/* ------------------------------------------------------------------
   Editor / publicar (modo secreto)
------------------------------------------------------------------ */
const editorOverlay = $('editor-overlay');
const edTitle = $('ed-title');
const edDate = $('ed-date');
const edText = $('ed-text');
const edCoverInput = $('ed-cover');
const edTextFileInput = $('ed-textfile');
let edCoverData = null;

function openEditor(){
  editorOverlay.classList.add('open');
}
function closeEditor(){
  editorOverlay.classList.remove('open');
}

edTitle.addEventListener('input', ()=>{
  $('editor-preview-title').textContent = edTitle.value.trim() || 'SIN TITULO';
});

edCoverInput.addEventListener('change', ()=>{
  const file = edCoverInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    edCoverData = e.target.result;
    $('ed-cover-label').textContent = file.name;
  };
  reader.readAsDataURL(file);
});

edTextFileInput.addEventListener('change', ()=>{
  const file = edTextFileInput.files[0];
  if(!file) return;
  $('ed-textfile-label').textContent = file.name;
  if(file.name.toLowerCase().endsWith('.txt')){
    const reader = new FileReader();
    reader.onload = e=>{ edText.value = e.target.result; };
    reader.readAsText(file);
  } else {
    $('editor-status').textContent = 'No se puede leer el .pdf automáticamente: pega el texto en el cuadro de abajo.';
  }
});

function resetEditor(){
  edTitle.value = '';
  edDate.value = '';
  edText.value = '';
  edCoverInput.value = '';
  edTextFileInput.value = '';
  edCoverData = null;
  $('ed-cover-label').textContent = 'seleccionar (.png/.gif)';
  $('ed-textfile-label').textContent = 'seleccionar archivo .txt/.pdf';
  $('editor-preview-title').textContent = 'SIN TITULO';
  $('editor-status').textContent = '';
}

$('ed-limpiar').addEventListener('click', resetEditor);

$('ed-publicar').addEventListener('click', async ()=>{
  const title = edTitle.value.trim() || 'SIN TITULO';
  const text = edText.value.trim();
  const dateStr = edDate.value.trim();

  if(!text){
    $('editor-status').textContent = 'Escribe (o sube) el texto del artículo antes de publicar.';
    return;
  }
  if(edCoverData && edCoverData.length > MAX_COVER_CHARS){
    $('editor-status').textContent = 'La imagen de portada es muy pesada, usa una más liviana.';
    return;
  }

  const now = Date.now();
  const newArticle = {
    title,
    dateStr: dateStr || new Date().toLocaleDateString('es-ES'),
    text,
    cover: edCoverData,
    publishedAt: now,
    views: 0,
    weekViews: 0,
    weekStart: now
  };

  const publishBtn = $('ed-publicar');
  publishBtn.disabled = true;
  $('editor-status').textContent = 'Publicando...';

  try{
    if(SHEETS_ENABLED){
      // Se guarda como fila nueva en la hoja de Google Sheets: queda
      // visible para todos los visitantes, para siempre (hasta que
      // alguien borre la fila a mano en la hoja).
      const res = await fetch(SHEETS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(Object.assign({ action: 'publish' }, newArticle))
      });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      await refreshFromSheet();
    } else {
      newArticle.id = cryptoId();
      articles.unshift(newArticle);
      saveLocalArticles();
      renderArticlesList();
    }
    resetEditor();
    closeEditor();
  }catch(e){
    console.error(e);
    $('editor-status').textContent = 'Error al publicar. Revisa la consola.';
  }finally{
    publishBtn.disabled = false;
  }
});

editorOverlay.addEventListener('click', (e)=>{
  if(e.target === editorOverlay) closeEditor();
});

/* ------------------------------------------------------------------
   Init
------------------------------------------------------------------ */
startArticlesSync();
// refresca las etiquetas NEW!/TOP cada minuto sin necesidad de recargar
setInterval(renderArticlesList, 60*1000);

// Si se llega desde otra página con ?search=... o ?code=... en la URL
// (por ejemplo desde la barra de búsqueda de la ficha de Registro),
// se aplica automáticamente al cargar.
(function applyIncomingParams(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const search = params.get('search');
  if(code && code === SECRET_CODE){
    openEditor();
    return;
  }
  if(search){
    searchInput.value = search;
    runSearch(search);
  }
})();
</script>

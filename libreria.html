<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Librería - RCorps</title>
<!-- Si Discord OAuth redirige aquí con un token, mandar a perfil.html -->
<script>
if(window.location.hash.includes('access_token=')){
  window.location.replace('perfil.html' + window.location.hash + window.location.search);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @font-face{
    font-family:'Pixel Arial 11';
    src:url('PixelArial11.ttf') format('truetype');
    font-weight:normal;
    font-style:normal;
    font-display:swap;
  }
</style>
<style>
  :root{
    --page-bg:#f1eee4;
    --card-border:#a99b78;
    --card-fill-top:#ece6d6;
    --card-fill-bottom:#e2dbc6;
    --field-bg:#f6f2e6;
    --field-border:#b6a985;
    --text-muted:#8a7c5f;
    --text-dark:#4a3a24;
    --maroon:#5a1414;
    --gray-btn:#6d6d6d;
    --gray-btn-dark:#565656;
  }

  *{box-sizing:border-box;}
  img{max-width:100%;}

  body{
    margin:0;
    min-height:100vh;
    background:var(--page-bg);
    font-family:'Pixel Arial 11', monospace;
    color:var(--text-dark);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 12px 80px;
  }

  /* ============ HOTBAR ============ */
  .hotbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    min-height:70px;
    padding:12px 30px;
    margin-bottom:24px;
    background-image:url('assets/hotbar.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    flex-wrap:wrap;
    gap:10px;
  }
  .hotbar-nav{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
  }
  .hotbar-nav a{color:var(--text-dark);text-decoration:none;}
  .hotbar-nav a:hover{opacity:0.75;}
  .hotbar-nav .active-link{font-weight:bold;text-decoration:underline;text-decoration-style:dotted;}
  .hotbar-nav .sep{color:var(--text-muted);}
  
  .hotbar-search{
    display:flex;
    align-items:center;
    width:320px;
    max-width:100%;
    height:38px;
    padding:0 14px;
    background-image:url('assets/barra_busqueda.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    position:relative;
  }
  .hotbar-search input{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    font-family:inherit;
    font-size:15px;
    color:var(--text-dark);
    padding-right:24px;
  }
  .hotbar-search input::placeholder{color:var(--text-muted);}
  .hotbar-search .search-icon{color:var(--text-muted);margin-left:8px;}
  
  /* Botón de limpiar búsqueda personalizado */
  .search-clear-btn{
    display:none;
    align-items:center;
    justify-content:center;
    width:18px;
    height:18px;
    background:#1c1c1c;
    border:1px solid var(--card-border);
    color:#fff;
    font-family:inherit;
    font-size:11px;
    cursor:pointer;
    position:absolute;
    right:36px;
    top:50%;
    transform:translateY(-50%);
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.8);
  }
  .search-clear-btn:hover{
    background:#333;
  }

  /* Escala de tarjeta en móvil */
  .card-scale-wrapper{
    position:relative;
    margin:0 auto;
  }

  .library-card{
    position:absolute;
    top:0;left:0;
    width:640px;
    height:460px;
    display:flex;
    gap:16px;
    transform-origin:top left;
  }

  /* Sidebar de categorías (izquierda) */
  .sidebar-panel{
    width:170px;
    height:100%;
    background-image:url('assets/panel_articulo.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:20px 14px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .category-btn{
    width:100%;
    height:75px;
    background-image:url('assets/caja_articulo.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    background-color:transparent;
    border:none;
    padding:10px 12px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    gap:4px;
    font-family:inherit;
    text-align:left;
    transition:filter 0.15s ease, transform 0.1s ease;
  }
  .category-btn:hover{
    filter:brightness(1.05);
    transform:translateY(-1px);
  }
  .category-btn.active{
    filter:brightness(0.88) contrast(1.05);
    transform:none;
  }
  .category-btn .cat-title{
    font-size:15px;
    font-weight:bold;
    color:var(--text-dark);
  }
  .category-btn .cat-desc{
    font-size:9px;
    color:var(--text-muted);
  }

  /* Panel de contenido (derecha) */
  .content-panel{
    flex:1;
    height:100%;
    background-image:url('assets/panel_lista.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:20px;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* Vista por defecto cuando no hay nada seleccionado */
  .default-view{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
  }
  .default-text{
    font-size:24px;
    color:var(--text-muted);
    opacity:0.6;
    letter-spacing:1px;
  }

  /* Listado de personajes */
  .characters-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
    width:100%;
    height:100%;
    overflow-y:auto;
    padding-right:4px;
    scrollbar-width:thin;
    scrollbar-color:var(--text-muted) transparent;
  }
  
  /* Scroll personalizado para la grilla */
  .characters-grid::-webkit-scrollbar{
    width:16px;
  }
  .characters-grid::-webkit-scrollbar-track{
    background:transparent;
  }
  .characters-grid::-webkit-scrollbar-thumb{
    background-image:url('assets/scroll.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
  }

  .character-card{
    background-image:url('assets/lista.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    background-color:transparent;
    border:none;
    height:390px;
    padding:8px 8px 36px 8px;
    position:relative;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    transition:transform 0.15s ease, filter 0.15s ease;
  }
  .character-card:hover{
    transform:translateY(-3px);
    filter:brightness(1.05);
  }
  .character-card .card-portrait-wrapper{
    width:100%;
    height:100%;
    border:1px solid var(--card-border);
    overflow:hidden;
  }
  .character-card img{
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .character-card .card-text{
    position:absolute;
    bottom:8px;
    left:0;
    right:0;
    text-align:center;
    display:flex;
    flex-direction:column;
    gap:2px;
    pointer-events:none;
  }
  .character-card .card-tag{
    font-size:9px;
    color:#e2dbc6;
    text-shadow:1px 1px 2px rgba(0,0,0,0.8);
  }
  .character-card .card-tag-img{
    width:90%;
    height:auto;
    display:block;
    margin:0 auto 2px;
    object-fit:contain;
  }
  .character-card .card-name{
    font-size:11px;
    font-weight:bold;
    color:#ffffff;
    text-shadow:1px 1px 2px rgba(0,0,0,0.8);
  }

  /* ============ MODAL DE DETALLE ============ */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
  }
  .modal-overlay.open{
    display:flex;
  }
  .modal-box{
    background-image:url('assets/caja_info.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    width:640px;
    height:430px;
    position:relative;
    padding:24px 20px 20px 20px;
    display:flex;
    gap:16px;
    animation:modalFadeIn 0.2s ease-out;
  }
  @keyframes modalFadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-close-btn{
    position:absolute;
    top:12px;
    right:12px;
    background:#1c1c1c;
    border:1px solid var(--card-border);
    color:#fff;
    width:20px;
    height:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:inherit;
    font-size:10px;
    cursor:pointer;
    z-index:30;
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.8);
  }
  .modal-close-btn:hover{
    background:#333;
    color:var(--maroon);
  }

  /* Retrato desbordante (izquierda) */
  .modal-portrait-container{
    position:absolute;
    left:-40px;
    top:-95px;
    height:600px;
    z-index:10;
    pointer-events:none;
  }
  .modal-portrait-container img{
    height:100%;
    width:auto;
    display:block;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,0.35));
    max-width:400px;
    object-fit:contain;
    pointer-events:none;
  }
  .modal-portrait-upload-btn{
    position:absolute;
    bottom:75px;
    left:50%;
    transform:translateX(-50%);
    pointer-events:auto;
    background:rgba(0,0,0,0.6);
    color:#fff;
    border:none;
    padding:4px 10px;
    border-radius:4px;
    font-size:10px;
    cursor:pointer;
    display:none;
    font-family:inherit;
    z-index:11;
  }
  .modal-portrait-upload-btn:hover{background:rgba(0,0,0,0.8);}

  /* ===== Editor de recorte de imagen ===== */
  .crop-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,0.75);
    display:none; align-items:center; justify-content:center;
    z-index:1000; flex-direction:column; gap:14px;
  }
  .crop-overlay.open{display:flex;}
  .crop-title{color:#fff; font-size:13px; font-family:inherit;}
  .crop-stage{
    position:relative;
    overflow:hidden;
    background-color:#ccc;
    background-image:
      linear-gradient(45deg, #aaa 25%, transparent 25%),
      linear-gradient(-45deg, #aaa 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #aaa 75%),
      linear-gradient(-45deg, transparent 75%, #aaa 75%);
    background-size:20px 20px;
    background-position:0 0, 0 10px, 10px -10px, -10px 0;
    border:2px solid #fff;
    touch-action:none;
    cursor:move;
    box-shadow:0 0 0 2000px rgba(0,0,0,0.4);
  }
  .crop-stage img{
    position:absolute;
    top:0; left:0;
    transform-origin:0 0;
    user-select:none; -webkit-user-drag:none;
    pointer-events:none;
    max-width:none;
  }
  .crop-controls{
    display:flex; align-items:center; gap:12px;
    color:#fff; font-size:12px; font-family:inherit;
  }
  .crop-controls input[type=range]{width:220px;}
  .crop-buttons{display:flex; gap:10px;}
  .crop-buttons button{
    cursor:pointer; border:none; border-radius:5px;
    padding:8px 20px; font-family:inherit; font-size:12px;
  }
  .crop-btn-ok{background:#2e7d32; color:#fff;}
  .crop-btn-cancel{background:#777; color:#fff;}

  /* Sección de información (derecha) */
  .modal-details{
    margin-left:310px;
    flex:1;
    display:flex;
    flex-direction:column;
    height:100%;
    justify-content:space-between;
  }
  .modal-details > * {
    flex-shrink:0;
  }

  .modal-info-title{
    font-size:14px;
    font-weight:bold;
    color:var(--text-dark);
    margin:0 0 6px 0;
  }

  .modal-fields{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  /* Campos con imágenes de fondo */
  .modal-field-box{
    display:flex;
    align-items:center;
    gap:8px;
    padding:2px 12px;
    background-size:100% 100%;
    background-repeat:no-repeat;
    height:25px;
  }
  .modal-field-box.long{
    background-image:url('assets/escribir_largo.png');
    width:100%;
  }
  .modal-field-box.medium{
    background-image:url('assets/escribir_medio.png');
    width:180px;
  }
  .modal-field-box.short{
    background-image:url('assets/escribir_corto.png');
    width:130px;
  }
  .modal-field-box label{
    font-size:11px;
    color:var(--text-muted);
    white-space:nowrap;
  }
  .modal-field-box span{
    font-size:11px;
    color:var(--text-dark);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* Sección de Modos */
  .modal-modes-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .modal-modes-row label{
    font-size:11px;
    color:var(--text-muted);
  }
  .modal-modes-container{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .modal-modes-container img{
    height:18px;
    width:auto;
    object-fit:contain;
  }

  /* Sección de Skills */
  .modal-skills-section{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .modal-skills-section label{
    font-size:11px;
    color:var(--text-muted);
  }
  .modal-skills-row{
    display:flex;
    gap:10px;
  }
  .modal-skill-slot{
    width:36px;
    height:36px;
    background-image:url('assets/cuadrado_seleccion_skills.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .modal-skill-slot img{
    width:70%;
    height:70%;
    object-fit:cover;
  }
  .modal-skill-slot .empty-slot{
    font-size:12px;
    color:var(--text-muted);
    line-height:1;
  }

  /* Sección de Biografía */
  .modal-bio-section{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .modal-bio-box{
    width:100%;
    height:90px;
    background-image:url('assets/biografia_texto.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:10px 12px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .modal-bio-box label{
    font-size:11px;
    color:var(--text-muted);
    flex:none;
  }
  .modal-bio-text{
    font-size:10px;
    color:var(--text-dark);
    line-height:1.4;
    overflow-y:auto;
    white-space:pre-wrap;
    word-wrap:break-word;
    scrollbar-width:thin;
    scrollbar-color:var(--text-muted) transparent;
  }
  
  /* Scrollbar personalizado para la bio */
  .modal-bio-text::-webkit-scrollbar{
    width:14px;
  }
  .modal-bio-text::-webkit-scrollbar-track{
    background:transparent;
  }
  .modal-bio-text::-webkit-scrollbar-thumb{
    background-image:url('assets/scroll.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
  }

  /* ============ ESTILOS DE EDICIÓN Y AUTHENTICACIÓN (ADMIN) ============ */
  .m-edit-input {
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 11px;
    color: var(--text-dark);
    flex: 1;
    width: 100%;
    padding: 0;
    height: 100%;
  }
  .m-edit-textarea {
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 10px;
    color: var(--text-dark);
    line-height: 1.4;
    resize: none;
    width: 100%;
    height: 60px;
    padding: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }
  .m-edit-textarea::-webkit-scrollbar {
    width: 14px;
  }
  .m-edit-textarea::-webkit-scrollbar-track {
    background: transparent;
  }
  .m-edit-textarea::-webkit-scrollbar-thumb {
    background-image: url('assets/scroll.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }

  /* Modales de Autenticación */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 210;
  }
  .auth-overlay.open {
    display: flex;
  }
  .auth-box {
    background-image: url('assets/panel_dialogo.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    width: 380px;
    padding: 26px 30px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: modalFadeIn 0.2s ease-out;
  }
  .auth-title {
    font-size: 20px;
    color: var(--maroon);
    font-weight: bold;
    margin: 0 0 6px 0;
  }
  .auth-fields {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .auth-field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
  }
  .auth-field-row label {
    font-size: 11px;
    color: var(--text-dark);
  }
  .auth-input-container {
    display: flex;
    align-items: center;
    width: 100%;
    height: 28px;
    padding: 0 10px;
    background-image: url('assets/rectangulo_de_escribir_largo.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }
  .auth-input-container input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 12px;
    color: var(--text-dark);
  }
  .auth-error-msg {
    position: absolute;
    right: 0;
    top: 0;
    font-size: 9px;
    color: #d32f2f;
    font-weight: bold;
  }
  .auth-links-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 10px;
  }
  .auth-link {
    color: #1a4fb5;
    text-decoration: underline;
    text-decoration-style: dotted;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
    font-size: inherit;
  }
  .auth-link.danger {
    color: var(--maroon);
  }

  /* Botones de acción admin */
  .admin-btn {
    font-family: inherit;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    border: 1px solid var(--card-border);
    background: linear-gradient(180deg, var(--card-fill-top), var(--card-fill-bottom));
    color: var(--text-dark);
    text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.5);
  }
  .admin-btn:hover {
    filter: brightness(1.05);
  }
  .admin-btn.delete-btn {
    background: #5a1414;
    color: #ffffff;
    border-color: #3a0c0c;
    text-shadow: 1px 1px 0px rgba(0,0,0,0.5);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
  }
  .admin-btn.delete-btn:hover {
    background: #731e1e;
  }

  /* Panel desplegable de Skills (Flotante) */
  .dropdown-panel {
    position: absolute;
    z-index: 250;
    background-image: url('assets/cuadrado_menu.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    padding: 14px;
    padding-right: 26px;
    display: none;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }
  .dropdown-panel::-webkit-scrollbar {
    width: 18px;
  }
  .dropdown-panel::-webkit-scrollbar-track {
    background: transparent;
  }
  .dropdown-panel::-webkit-scrollbar-thumb {
    background-image: url('assets/scroll.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }
  .dropdown-panel.list-panel.open { display: flex; flex-wrap: wrap; gap: 6px; }
  .dropdown-panel.grid-panel {
    width: 280px;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .dropdown-panel.grid-panel.open {
    display: grid;
  }
  .skill-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
    font-family: inherit;
  }
  .skill-option img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    opacity: 1;
    transition: opacity .15s ease;
  }
  .skill-option span {
    font-size: 9px;
    color: var(--text-dark);
    text-align: center;
  }
  .list-option {
    background: none;
    border: none;
    padding: 2px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .list-option img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    display: block;
  }
  .list-option:hover img { opacity: 0.7; }
  .list-option.selected img {
    border: 2px solid var(--maroon);
    opacity: 0.8;
  }

  /* Ajuste de tags para que se muestren como insignias legibles y no cuadradas en el picker */
  #tags-picker.list-panel.open {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #tags-picker .list-option {
    width: 100%;
    display: block;
    margin-bottom: 2px;
  }

const $ = (id) => document.getElementById(id);

const cardWrapper = $('card-scale-wrapper');

function updateCardScale(){
  if(window.innerWidth <= 680){
    card.style.transform = 'none';
    cardWrapper.style.width = '100%';
    cardWrapper.style.height = 'auto';
    return;
  }
  card.style.transform = 'scale(1)';
  const available = cardWrapper.parentElement.clientWidth;
  const scale = Math.min(1, available / card.offsetWidth);
  card.style.transform = `scale(${scale})`;
  cardWrapper.style.width  = (card.offsetWidth  * scale) + 'px';
  cardWrapper.style.height = (card.offsetHeight * scale) + 'px';
}
window.addEventListener('resize', updateCardScale);
window.addEventListener('orientationchange', updateCardScale);
if(document.fonts?.ready) document.fonts.ready.then(updateCardScale);

/* ==========================================================================
   CATEGORÍAS Y GRILLA DE PERSONAJES
   ========================================================================== */
let currentCategories = [];

async function loadCategories(){
  const { data, error } = await db.from('categories')
    .select('*').order('sort_order').order('name');
  if(error){
    console.error('Error cargando categorías:', error.message);
    currentCategories = [];
  } else {
    currentCategories = data || [];
  }
  renderCategoryList();
}

function renderCategoryList(){
  const list = $('category-list');
  list.innerHTML = '';
  currentCategories.forEach(cat => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'category-btn';
    btn.dataset.category = cat.name;
    if(cat.name === currentCategory) btn.classList.add('active');
    btn.onclick = () => selectCategory(cat.name);

    const title = document.createElement('span');
    title.className = 'cat-title';
    title.textContent = cat.name;
    const desc = document.createElement('span');
    desc.className = 'cat-desc';
    desc.textContent = cat.description || '';
    btn.appendChild(title);
    btn.appendChild(desc);

    // Botón de borrar categoría, solo para admins
    if(isAdmin){
      const del = document.createElement('span');
      del.textContent = '×';
      del.title = 'Borrar categoría';
      del.style.cssText = 'position:absolute;top:4px;right:6px;font-size:14px;color:#d32f2f;cursor:pointer;line-height:1;';
      del.onclick = (e) => { e.stopPropagation(); deleteCategory(cat); };
      btn.style.position = 'relative';
      btn.appendChild(del);
    }
    list.appendChild(btn);
  });
}

function addCategory(){
  $('cat-modal-name').value = '';
  $('cat-modal-desc').value = '';
  $('cat-modal').style.display = 'flex';
  $('cat-modal-name').focus();
  $('cat-modal-accept').onclick = async function(){
    const name = $('cat-modal-name').value.trim();
    if(!name){ $('cat-modal-name').focus(); return; }
    const desc = $('cat-modal-desc').value.trim();
    $('cat-modal').style.display = 'none';
    const maxOrder = currentCategories.reduce((m,c)=>Math.max(m, c.sort_order||0), 0);
    const { error } = await db.from('categories').insert({
      name, description: desc, sort_order: maxOrder + 1
    });
    if(error){ alert('Error al crear categoría: ' + error.message); return; }
    await loadCategories();
  };
  $('cat-modal-cancel').onclick = function(){
    $('cat-modal').style.display = 'none';
  };
}

async function deleteCategory(cat){
  const { count, error: countErr } = await db.from('characters')
    .select('id', { count: 'exact', head: true })
    .eq('category', cat.name).eq('is_wiki', true);
  if(countErr){ alert('Error al comprobar la categoría: ' + countErr.message); return; }
  if(count && count > 0){
    alert('No se puede borrar "' + cat.name + '": tiene ' + count + ' personaje(s). Muévelos o bórralos primero.');
    return;
  }
  if(!confirm('¿Borrar la categoría "' + cat.name + '"?')) return;
  const { error } = await db.from('categories').delete().eq('id', cat.id);
  if(error){ alert('Error al borrar categoría: ' + error.message); return; }
  if(currentCategory === cat.name){
    currentCategory = null;
    $('characters-grid').style.display = 'none';
    $('default-view').style.display = '';
  }
  await loadCategories();
}

async function selectCategory(category){
  currentCategory = category;
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector('.category-btn[data-category="' + category + '"]');
  if(activeBtn) activeBtn.classList.add('active');
  $('default-view').style.display = 'none';
  $('characters-grid').style.display = 'grid';
  await renderCharacters();
}

async function renderCharacters(){
  const grid = $('characters-grid');
  grid.innerHTML = '<div class="inline-spinner" style="grid-column:1/-1;"><div class="sp"></div></div>';

  const searchVal = $('hotbar-search-input').value.trim().toLowerCase();

  let query = db.from('characters').select('*').eq('category', currentCategory).eq('is_wiki', true).order('id');
  const { data, error } = await query;

  if(error){
    grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding-top:60px;color:#d32f2f;font-size:11px;">Error al cargar: ${error.message}</div>`;
    return;
  }

  const filtered = (data || []).filter(c =>
    (c.name  || '').toLowerCase().includes(searchVal) ||
    (c.roblox|| '').toLowerCase().includes(searchVal)
  );

  if(filtered.length === 0){
    grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding-top:80px;color:var(--text-muted);font-size:12px;">No se encontraron personajes.</div>`;
    return;
  }

  grid.innerHTML = '';
  filtered.forEach((char, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'character-card char-fade-in';
    btn.style.animationDelay = (i * 0.05) + 's';
    btn.onclick = () => openModal(char);

    const portWrap = document.createElement('div');
    portWrap.className = 'card-portrait-wrapper';
    const img = document.createElement('img');
    img.src = char.portrait_list || 'assets/foto_lista1.png';
    img.alt = char.name || 'Personaje';
    img.onerror = () => { img.style.background = '#ccc'; };
    portWrap.appendChild(img);

    const textWrap = document.createElement('div');
    textWrap.className = 'card-text';
    // Mostrar el primer tag/mode como imagen si existe
    const modes = char.modes || [];
    if(modes.length > 0){
      const tagImg = document.createElement('img');
      tagImg.className = 'card-tag-img';
      tagImg.src = modes[0];
      tagImg.alt = 'Tag';
      tagImg.style.cssText = 'width:90%;height:auto;display:block;margin:0 auto 2px;';
      tagImg.onerror = () => { tagImg.style.display = 'none'; };
      textWrap.appendChild(tagImg);
    }
    const nameSpan = document.createElement('span'); nameSpan.className = 'card-name'; nameSpan.textContent = char.name || 'Name';
    textWrap.appendChild(nameSpan);

    btn.appendChild(portWrap);
    btn.appendChild(textWrap);
    grid.appendChild(btn);
  });
}

/* ==========================================================================
   BÚSQUEDA
   ========================================================================== */
const searchInput = $('hotbar-search-input');
const clearBtn    = $('search-clear-btn');

searchInput.addEventListener('input', () => {
  clearBtn.style.display = searchInput.value ? 'flex' : 'none';
  if(currentCategory) renderCharacters();
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  searchInput.focus();
  if(currentCategory) renderCharacters();
});
searchInput.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  if(!currentCategory && currentCategories.length > 0) selectCategory(currentCategories[0].name);
  else if(currentCategory) renderCharacters();
});

/* ==========================================================================
   MODAL DE DETALLE
   ========================================================================== */
function openModal(character){
  currentCharId = character.id;
  adminSkills   = [...(character.skills || [])];
  adminModes    = [...(character.modes || [])];
  // Guardar rutas originales del retrato para poder guardarlas después
  currentPortraitUrl = character.portrait_info || 'assets/foto_info.png';
  currentPortraitListUrl = character.portrait_list || 'assets/foto_lista1.png';

  $('m-portrait').src = currentPortraitUrl;
  $('m-portrait-list-thumb').src = currentPortraitListUrl;

  // Campos texto
  $('m-name').textContent   = character.name   || '';
  $('m-roblox').textContent = character.roblox  || '';
  $('m-age').textContent    = character.age     || '';
  $('m-gender').textContent = character.gender  || '';
  $('m-bio').textContent    = character.bio     || '';

  // Campos edit
  $('m-name-edit').value   = character.name   || '';
  $('m-roblox-edit').value = character.roblox  || '';
  $('m-age-edit').value    = character.age     || '';
  $('m-gender-edit').value = character.gender  || '';
  $('m-bio-edit').value    = character.bio     || '';

  // Modos
  renderModes(character.modes || []);
  // Skills
  renderModalSkills();

  // Admin mode toggle
  setAdminEditMode(isAdmin);

  // Marcar los tags seleccionados en el picker
  tagsPicker.querySelectorAll('.list-option').forEach(child => {
    const imgEl = child.querySelector('img');
    if(imgEl){
      const isSel = adminModes.some(m => imgEl.getAttribute('src') === m || imgEl.src.endsWith(m));
      if(isSel) child.classList.add('selected');
      else child.classList.remove('selected');
    }
  });

  $('detail-modal').classList.add('open');
}

function renderModes(modes){
  const container = $('m-modes-container');
  container.innerHTML = '';
  if(!modes || modes.length === 0){
    // Placeholder visible para admin (área de click clara)
    const ph = document.createElement('span');
    ph.className = 'empty-slot';
    ph.textContent = '+';
    ph.style.cssText = 'font-size:16px;color:var(--text-muted);';
    container.appendChild(ph);
    return;
  }
  modes.forEach(path => {
    const img = document.createElement('img');
    img.src = path;
    img.alt = 'Modo';
    img.onerror = () => img.remove();
    container.appendChild(img);
  });
}

function renderModalSkills(){
  [1,2].forEach(n => {
    const slot = $('m-skill-' + n);
    slot.innerHTML = '';
    const path = adminSkills[n-1];
    if(path){
      const img = document.createElement('img');
      img.src = path;
      img.alt = 'Skill ' + n;
      img.onerror = () => { slot.innerHTML = '<span class="empty-slot">+</span>'; };
      slot.appendChild(img);
    } else {
      slot.innerHTML = '<span class="empty-slot">+</span>';
    }
    // Clic en slot (admin): abrir picker
    if(isAdmin){
      slot.style.cursor = 'pointer';
      slot.onclick = (e) => { e.stopPropagation(); toggleSkillsPicker(); };
    } else {
      slot.style.cursor = 'default';
      slot.onclick = null;
    }
  });
}

function setAdminEditMode(admin){
  // Alternar entre spans (vista) e inputs (edición)
  document.querySelectorAll('.m-view-field').forEach(el => {
    el.style.display = admin ? 'none' : '';
  });
  [$('m-name-edit'),$('m-roblox-edit'),$('m-age-edit'),$('m-gender-edit')].forEach(el => {
    el.style.display = admin ? '' : 'none';
  });
  $('m-bio-edit').style.display = admin ? '' : 'none';
  $('admin-actions').style.display = admin ? 'flex' : 'none';
  // Refrescar skill slots para agregar/quitar clic handler
  renderModalSkills();
  // Hacer el contenedor de modes y la foto clickeables para admins
  const modesContainer = $('m-modes-container');
  const portraitUpload = $('m-portrait-upload');
  const portraitBtn = $('m-portrait-btn');
  const portraitListUpload = $('m-portrait-list-upload');
  const cardPhotoRow = $('m-cardphoto-row');
  const cardPhotoThumb = $('m-portrait-list-thumb');
  if(admin){
    portraitBtn.style.display = 'block';
    portraitBtn.onclick = (e) => { e.stopPropagation(); portraitUpload.click(); };
    cardPhotoRow.style.display = 'flex';
    cardPhotoThumb.onclick = (e) => { e.stopPropagation(); portraitListUpload.click(); };
    modesContainer.style.cursor = 'pointer';
    modesContainer.onclick = (e) => {
      e.stopPropagation();
      toggleTagsPicker();
    };
  } else {
    portraitBtn.style.display = 'none';
    portraitBtn.onclick = null;
    cardPhotoRow.style.display = 'none';
    cardPhotoThumb.onclick = null;
    modesContainer.style.cursor = 'default';
    modesContainer.onclick = null;
  }
}

function closeModal(){
  $('detail-modal').classList.remove('open');
  $('skills-picker').classList.remove('open');
  $('tags-picker').classList.remove('open');
  currentCharId = null;
}

$('detail-modal').addEventListener('click', e => {
  if(e.target === $('detail-modal')) closeModal();
});

/* ---------- Skills Picker (admin) ---------- */
const skillsPicker = $('skills-picker');
SKILL_OPTIONS.forEach(opt => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'skill-option';
  const img = document.createElement('img');
  img.src = opt.image; img.alt = opt.name;
  img.onerror = () => { img.style.background = '#ccc'; };
  const lbl = document.createElement('span');
  lbl.textContent = opt.name;
  btn.appendChild(img);
  btn.appendChild(lbl);
  btn.addEventListener('click', () => {
    const idx = adminSkills.indexOf(opt.image);
    if(idx >= 0){
      adminSkills.splice(idx, 1);
    } else {
      if(adminSkills.length >= 2){ adminSkills.shift(); }
      adminSkills.push(opt.image);
    }
    renderModalSkills();
    skillsPicker.classList.remove('open');
  });
  skillsPicker.appendChild(btn);
});

function toggleSkillsPicker(){
  // Cierra el de tags para evitar superposición
  tagsPicker.classList.remove('open');
  skillsPicker.classList.toggle('open');
}

/* ---------- Tags Picker (admin) ---------- */
const tagsPicker = $('tags-picker');
TAG_OPTIONS.forEach(opt => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'list-option';
  const img = document.createElement('img');
  img.src = opt.image; img.alt = opt.name;
  img.onerror = () => { btn.style.display = 'none'; };
  btn.appendChild(img);
  btn.addEventListener('click', () => {
    const idx = adminModes.indexOf(opt.image);
    if(idx >= 0){
      adminModes.splice(idx, 1);
      btn.classList.remove('selected');
    } else {
      if(adminModes.length >= 2){
        const oldImage = adminModes.shift();
        const oldBtn = Array.from(tagsPicker.children).find(child => {
          const imgEl = child.querySelector('img');
          return imgEl && (imgEl.getAttribute('src') === oldImage || imgEl.src.endsWith(oldImage));
        });
        if(oldBtn) oldBtn.classList.remove('selected');
      }
      adminModes.push(opt.image);
      btn.classList.add('selected');
    }
    renderModes(adminModes);
  });
  tagsPicker.appendChild(btn);
});

function toggleTagsPicker(){
  // Cierra el de skills para evitar superposición
  skillsPicker.classList.remove('open');
  tagsPicker.classList.toggle('open');
}

/* ---------- Portrait upload (admin) ---------- */
$('m-portrait-upload').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    // Marco del modal: vertical 270x386 (ratio ~0.7). Salida a 540x772.
    openCropEditor(ev.target.result, 270/386, 540, 772, function(finalUrl){
      $('m-portrait').src = finalUrl;
      currentPortraitUrl = finalUrl;
    });
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

// Foto de la tarjeta (portrait_list) - no cambia el retrato del modal
$('m-portrait-list-upload').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    // Marco de tarjeta: vertical (ratio ~0.72). Salida a 360x500.
    openCropEditor(ev.target.result, 360/500, 360, 500, function(finalUrl){
      currentPortraitListUrl = finalUrl;
      $('m-portrait-list-thumb').src = finalUrl;
    });
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

async function saveCharacter(){
  if(!currentCharId) return;
  const updates = {
    name:    $('m-name-edit').value.trim(),
    roblox:  $('m-roblox-edit').value.trim(),
    age:     $('m-age-edit').value.trim(),
    gender:  $('m-gender-edit').value.trim(),
    bio:     $('m-bio-edit').value.trim(),
    skills:  adminSkills,
    modes:   adminModes,
    portrait_info: currentPortraitUrl,
    portrait_list: currentPortraitListUrl,
  };
  const { error } = await db.from('characters').update(updates).eq('id', currentCharId);
  if(error){ alert('Error al guardar: ' + error.message); return; }
  closeModal();
  await renderCharacters();
}

<!-- Editor de recorte de imagen -->
<div class="crop-overlay" id="crop-overlay">
  <div class="crop-title">Ajusta la imagen (arrastra y usa el zoom)</div>
  <div class="crop-stage" id="crop-stage">
    <img id="crop-img" src="" alt="" />
  </div>
  <div class="crop-controls">
    <span>Zoom</span>
    <input type="range" id="crop-zoom" min="0.2" max="4" step="0.01" value="1" />
  </div>
  <div class="crop-buttons">
    <button type="button" class="crop-btn-cancel" id="crop-cancel">Cancelar</button>
    <button type="button" class="crop-btn-ok" id="crop-ok">Aplicar</button>
  </div>
</div>

<script>
/* ==========================================================================
   EDITOR DE RECORTE (arrastrar + zoom -> imagen final recortada)
   ========================================================================== */
(function(){
  const overlay = document.getElementById('crop-overlay');
  const stage   = document.getElementById('crop-stage');
  const img     = document.getElementById('crop-img');
  const zoom    = document.getElementById('crop-zoom');
  const okBtn   = document.getElementById('crop-ok');
  const cancelBtn = document.getElementById('crop-cancel');

  let state = null; // { natW, natH, baseScale, scale, x, y, outW, outH, cb }

  // Tamaño visible del stage según el ratio deseado (marco vertical)
  function stageSize(ratio){
    // ratio = ancho/alto ; usamos alto fijo cómodo
    const H = 420;
    const W = Math.round(H * ratio);
    return { W, H };
  }

  function clamp(){
    const dispW = state.natW * state.scale;
    const dispH = state.natH * state.scale;
    // Eje X
    if(dispW >= state.stageW){
      // Cubre: no dejar huecos laterales
      const minX = state.stageW - dispW;
      if(state.x > 0) state.x = 0;
      if(state.x < minX) state.x = minX;
    } else {
      // Más chica que el marco: mantener dentro
      if(state.x < 0) state.x = 0;
      if(state.x > state.stageW - dispW) state.x = state.stageW - dispW;
    }
    // Eje Y
    if(dispH >= state.stageH){
      const minY = state.stageH - dispH;
      if(state.y > 0) state.y = 0;
      if(state.y < minY) state.y = minY;
    } else {
      if(state.y < 0) state.y = 0;
      if(state.y > state.stageH - dispH) state.y = state.stageH - dispH;
    }
  }

  function apply(){
    img.style.width  = (state.natW * state.scale) + 'px';
    img.style.height = (state.natH * state.scale) + 'px';
    img.style.transform = 'translate(' + state.x + 'px,' + state.y + 'px)';
  }

  // openCropEditor(dataUrl, ratio, outW, outH, callback(finalDataUrl))
  window.openCropEditor = function(dataUrl, ratio, outW, outH, cb){
    const { W, H } = stageSize(ratio);
    stage.style.width  = W + 'px';
    stage.style.height = H + 'px';

    const tmp = new Image();
    tmp.onload = function(){
      const natW = tmp.naturalWidth;
      const natH = tmp.naturalHeight;
      // Escala base (referencia del slider = cover)
      const baseScale = Math.max(W / natW, H / natH);
      // Escala inicial = contain (imagen completa visible), más alejada
      const initScale = Math.min(W / natW, H / natH);
      state = {
        natW, natH, baseScale,
        scale: initScale,
        x: (W - natW * initScale) / 2,
        y: (H - natH * initScale) / 2,
        stageW: W, stageH: H,
        outW, outH, cb
      };
      img.src = dataUrl;
      const initFactor = initScale / baseScale;
      zoom.min = Math.min(0.2, initFactor).toFixed(2);
      zoom.value = initFactor.toFixed(2);
      apply();
      overlay.classList.add('open');
    };
    tmp.src = dataUrl;
  };

  // Zoom
  zoom.addEventListener('input', function(){
    if(!state) return;
    const factor = parseFloat(zoom.value);
    // Zoom respecto al centro del stage
    const cx = state.stageW / 2, cy = state.stageH / 2;
    const prevScale = state.scale;
    const newScale = state.baseScale * factor;
    const k = newScale / prevScale;
    state.x = cx - (cx - state.x) * k;
    state.y = cy - (cy - state.y) * k;
    state.scale = newScale;
    clamp();
    apply();
  });

  // Arrastrar
  let dragging = false, lastX = 0, lastY = 0;
  function down(e){
    if(!state) return;
    dragging = true;
    const p = e.touches ? e.touches[0] : e;
    lastX = p.clientX; lastY = p.clientY;
  }
  function move(e){
    if(!dragging || !state) return;
    const p = e.touches ? e.touches[0] : e;
    state.x += p.clientX - lastX;
    state.y += p.clientY - lastY;
    lastX = p.clientX; lastY = p.clientY;
    clamp(); apply();
    e.preventDefault();
  }
  function up(){ dragging = false; }
  stage.addEventListener('mousedown', down);
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', up);
  stage.addEventListener('touchstart', down, {passive:false});
  window.addEventListener('touchmove', move, {passive:false});
  window.addEventListener('touchend', up);

  // Aplicar -> genera la imagen final recortada
  okBtn.addEventListener('click', function(){
    if(!state) return;
    const canvas = document.createElement('canvas');
    canvas.width  = state.outW;
    canvas.height = state.outH;
    const ctx = canvas.getContext('2d');
    // Se deja el canvas transparente (PNG conserva la transparencia)
    // Mapear stage -> canvas de salida
    const sx = state.outW / state.stageW;
    const sy = state.outH / state.stageH;
    ctx.drawImage(
      img,
      state.x * sx, state.y * sy,
      state.natW * state.scale * sx,
      state.natH * state.scale * sy
    );
    const finalUrl = canvas.toDataURL('image/png');
    overlay.classList.remove('open');
    const cb = state.cb; state = null;
    if(cb) cb(finalUrl);
  });

  cancelBtn.addEventListener('click', function(){
    overlay.classList.remove('open');
    state = null;
  });
})();
</script>

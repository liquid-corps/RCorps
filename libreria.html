<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Librería - RCorps</title>
<!-- Si Discord OAuth redirige aquí con un token, mandar a perfil.html -->
<script>
if(window.location.hash.includes('access_token=')){
  window.location.replace('perfil.html' + window.location.hash + window.location.search);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @font-face{
    font-family:'Pixel Arial 11';
    src:url('PixelArial11.ttf') format('truetype');
    font-weight:normal;
    font-style:normal;
    font-display:swap;
  }
</style>
<style>
  :root{
    --page-bg:#f1eee4;
    --card-border:#a99b78;
    --card-fill-top:#ece6d6;
    --card-fill-bottom:#e2dbc6;
    --field-bg:#f6f2e6;
    --field-border:#b6a985;
    --text-muted:#8a7c5f;
    --text-dark:#4a3a24;
    --maroon:#5a1414;
    --gray-btn:#6d6d6d;
    --gray-btn-dark:#565656;
  }

  *{box-sizing:border-box;}
  img{max-width:100%;}

  body{
    margin:0;
    min-height:100vh;
    background:var(--page-bg);
    font-family:'Pixel Arial 11', monospace;
    color:var(--text-dark);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 12px 80px;
  }

  /* ============ HOTBAR ============ */
  .hotbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    min-height:70px;
    padding:12px 30px;
    margin-bottom:24px;
    background-image:url('assets/hotbar.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    flex-wrap:wrap;
    gap:10px;
  }
  .hotbar-nav{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
  }
  .hotbar-nav a{color:var(--text-dark);text-decoration:none;}
  .hotbar-nav a:hover{opacity:0.75;}
  .hotbar-nav .active-link{font-weight:bold;text-decoration:underline;text-decoration-style:dotted;}
  .hotbar-nav .sep{color:var(--text-muted);}
  
  .hotbar-search{
    display:flex;
    align-items:center;
    width:320px;
    max-width:100%;
    height:38px;
    padding:0 14px;
    background-image:url('assets/barra_busqueda.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    position:relative;
  }
  .hotbar-search input{
    flex:1;
    border:none;
    background:transparent;
    outline:none;
    font-family:inherit;
    font-size:15px;
    color:var(--text-dark);
    padding-right:24px;
  }
  .hotbar-search input::placeholder{color:var(--text-muted);}
  .hotbar-search .search-icon{color:var(--text-muted);margin-left:8px;}
  
  /* Botón de limpiar búsqueda personalizado */
  .search-clear-btn{
    display:none;
    align-items:center;
    justify-content:center;
    width:18px;
    height:18px;
    background:#1c1c1c;
    border:1px solid var(--card-border);
    color:#fff;
    font-family:inherit;
    font-size:11px;
    cursor:pointer;
    position:absolute;
    right:36px;
    top:50%;
    transform:translateY(-50%);
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.8);
  }
  .search-clear-btn:hover{
    background:#333;
  }

  /* Escala de tarjeta en móvil */
  .card-scale-wrapper{
    position:relative;
    margin:0 auto;
  }

  .library-card{
    position:absolute;
    top:0;left:0;
    width:640px;
    height:460px;
    display:flex;
    gap:16px;
    transform-origin:top left;
  }

  /* Sidebar de categorías (izquierda) */
  .sidebar-panel{
    width:170px;
    height:100%;
    background-image:url('assets/panel_articulo.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:20px 14px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .category-btn{
    width:100%;
    height:75px;
    background-image:url('assets/caja_articulo.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    background-color:transparent;
    border:none;
    padding:10px 12px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:flex-start;
    gap:4px;
    font-family:inherit;
    text-align:left;
    transition:filter 0.15s ease, transform 0.1s ease;
  }
  .category-btn:hover{
    filter:brightness(1.05);
    transform:translateY(-1px);
  }
  .category-btn.active{
    filter:brightness(0.88) contrast(1.05);
    transform:none;
  }
  .category-btn .cat-title{
    font-size:15px;
    font-weight:bold;
    color:var(--text-dark);
  }
  .category-btn .cat-desc{
    font-size:9px;
    color:var(--text-muted);
  }

  /* Panel de contenido (derecha) */
  .content-panel{
    flex:1;
    height:100%;
    background-image:url('assets/panel_lista.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:20px;
    display:flex;
    flex-direction:column;
    position:relative;
  }

  /* Vista por defecto cuando no hay nada seleccionado */
  .default-view{
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
  }
  .default-text{
    font-size:24px;
    color:var(--text-muted);
    opacity:0.6;
    letter-spacing:1px;
  }

  /* Listado de personajes */
  .characters-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
    width:100%;
    height:100%;
    overflow-y:auto;
    padding-right:4px;
    scrollbar-width:thin;
    scrollbar-color:var(--text-muted) transparent;
  }
  
  /* Scroll personalizado para la grilla */
  .characters-grid::-webkit-scrollbar{
    width:16px;
  }
  .characters-grid::-webkit-scrollbar-track{
    background:transparent;
  }
  .characters-grid::-webkit-scrollbar-thumb{
    background-image:url('assets/scroll.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
  }

  .character-card{
    background-image:url('assets/lista.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    background-color:transparent;
    border:none;
    height:390px;
    padding:8px 8px 36px 8px;
    position:relative;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    transition:transform 0.15s ease, filter 0.15s ease;
  }
  .character-card:hover{
    transform:translateY(-3px);
    filter:brightness(1.05);
  }
  .character-card .card-portrait-wrapper{
    width:100%;
    height:100%;
    border:1px solid var(--card-border);
    overflow:hidden;
  }
  .character-card img{
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .character-card .card-text{
    position:absolute;
    bottom:8px;
    left:0;
    right:0;
    text-align:center;
    display:flex;
    flex-direction:column;
    gap:2px;
    pointer-events:none;
  }
  .character-card .card-tag{
    font-size:9px;
    color:#e2dbc6;
    text-shadow:1px 1px 2px rgba(0,0,0,0.8);
  }
  .character-card .card-tag-img{
    width:90%;
    height:auto;
    display:block;
    margin:0 auto 2px;
    object-fit:contain;
  }
  .character-card .card-name{
    font-size:11px;
    font-weight:bold;
    color:#ffffff;
    text-shadow:1px 1px 2px rgba(0,0,0,0.8);
  }

  /* ============ MODAL DE DETALLE ============ */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
  }
  .modal-overlay.open{
    display:flex;
  }
  .modal-box{
    background-image:url('assets/caja_info.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    width:640px;
    height:430px;
    position:relative;
    padding:24px 20px 20px 20px;
    display:flex;
    gap:16px;
    animation:modalFadeIn 0.2s ease-out;
  }
  @keyframes modalFadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-close-btn{
    position:absolute;
    top:12px;
    right:12px;
    background:#1c1c1c;
    border:1px solid var(--card-border);
    color:#fff;
    width:20px;
    height:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:inherit;
    font-size:10px;
    cursor:pointer;
    z-index:30;
    box-shadow:inset 0 1px 3px rgba(0,0,0,0.8);
  }
  .modal-close-btn:hover{
    background:#333;
    color:var(--maroon);
  }

  /* Retrato desbordante (izquierda) */
  .modal-portrait-container{
    position:absolute;
    left:-70px;
    top:-55px;
    height:495px;
    z-index:10;
    pointer-events:none;
  }
  .modal-portrait-container img{
    height:100%;
    width:auto;
    display:block;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,0.35));
    max-width:320px;
    object-fit:contain;
  }
  .modal-portrait-upload-btn{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    pointer-events:auto;
    background:rgba(0,0,0,0.6);
    color:#fff;
    border:none;
    padding:4px 10px;
    border-radius:4px;
    font-size:10px;
    cursor:pointer;
    display:none;
    font-family:inherit;
    z-index:11;
  }
  .modal-portrait-upload-btn:hover{background:rgba(0,0,0,0.8);}

  /* Sección de información (derecha) */
  .modal-details{
    margin-left:310px;
    flex:1;
    display:flex;
    flex-direction:column;
    height:100%;
    justify-content:space-between;
  }

  .modal-info-title{
    font-size:14px;
    font-weight:bold;
    color:var(--text-dark);
    margin:0 0 6px 0;
  }

  .modal-fields{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  /* Campos con imágenes de fondo */
  .modal-field-box{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 12px;
    background-size:100% 100%;
    background-repeat:no-repeat;
    height:25px;
  }
  .modal-field-box.long{
    background-image:url('assets/escribir_largo.png');
    width:100%;
  }
  .modal-field-box.medium{
    background-image:url('assets/escribir_medio.png');
    width:180px;
  }
  .modal-field-box.short{
    background-image:url('assets/escribir_corto.png');
    width:130px;
  }
  .modal-field-box label{
    font-size:11px;
    color:var(--text-muted);
    white-space:nowrap;
  }
  .modal-field-box span{
    font-size:11px;
    color:var(--text-dark);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* Sección de Modos */
  .modal-modes-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .modal-modes-row label{
    font-size:11px;
    color:var(--text-muted);
  }
  .modal-modes-container{
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .modal-modes-container img{
    height:18px;
    width:auto;
    object-fit:contain;
  }

  /* Sección de Skills */
  .modal-skills-section{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .modal-skills-section label{
    font-size:11px;
    color:var(--text-muted);
  }
  .modal-skills-row{
    display:flex;
    gap:10px;
  }
  .modal-skill-slot{
    width:36px;
    height:36px;
    background-image:url('assets/cuadrado_seleccion_skills.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .modal-skill-slot img{
    width:70%;
    height:70%;
    object-fit:cover;
  }
  .modal-skill-slot .empty-slot{
    font-size:12px;
    color:var(--text-muted);
    line-height:1;
  }

  /* Sección de Biografía */
  .modal-bio-section{
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .modal-bio-box{
    width:100%;
    height:90px;
    background-image:url('assets/biografia_texto.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:10px 12px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .modal-bio-box label{
    font-size:11px;
    color:var(--text-muted);
    flex:none;
  }
  .modal-bio-text{
    font-size:10px;
    color:var(--text-dark);
    line-height:1.4;
    overflow-y:auto;
    white-space:pre-wrap;
    word-wrap:break-word;
    scrollbar-width:thin;
    scrollbar-color:var(--text-muted) transparent;
  }
  
  /* Scrollbar personalizado para la bio */
  .modal-bio-text::-webkit-scrollbar{
    width:14px;
  }
  .modal-bio-text::-webkit-scrollbar-track{
    background:transparent;
  }
  .modal-bio-text::-webkit-scrollbar-thumb{
    background-image:url('assets/scroll.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
  }

  /* ============ ESTILOS DE EDICIÓN Y AUTHENTICACIÓN (ADMIN) ============ */
  .m-edit-input {
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 11px;
    color: var(--text-dark);
    flex: 1;
    width: 100%;
    padding: 0;
  }
  .m-edit-textarea {
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 10px;
    color: var(--text-dark);
    line-height: 1.4;
    resize: none;
    width: 100%;
    height: 60px;
    padding: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }
  .m-edit-textarea::-webkit-scrollbar {
    width: 14px;
  }
  .m-edit-textarea::-webkit-scrollbar-track {
    background: transparent;
  }
  .m-edit-textarea::-webkit-scrollbar-thumb {
    background-image: url('assets/scroll.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }

  /* Modales de Autenticación */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 210;
  }
  .auth-overlay.open {
    display: flex;
  }
  .auth-box {
    background-image: url('assets/panel_dialogo.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    width: 380px;
    padding: 26px 30px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: modalFadeIn 0.2s ease-out;
  }
  .auth-title {
    font-size: 20px;
    color: var(--maroon);
    font-weight: bold;
    margin: 0 0 6px 0;
  }
  .auth-fields {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .auth-field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
  }
  .auth-field-row label {
    font-size: 11px;
    color: var(--text-dark);
  }
  .auth-input-container {
    display: flex;
    align-items: center;
    width: 100%;
    height: 28px;
    padding: 0 10px;
    background-image: url('assets/rectangulo_de_escribir_largo.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }
  .auth-input-container input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 12px;
    color: var(--text-dark);
  }
  .auth-error-msg {
    position: absolute;
    right: 0;
    top: 0;
    font-size: 9px;
    color: #d32f2f;
    font-weight: bold;
  }
  .auth-links-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    font-size: 10px;
  }
  .auth-link {
    color: #1a4fb5;
    text-decoration: underline;
    text-decoration-style: dotted;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
    font-size: inherit;
  }
  .auth-link.danger {
    color: var(--maroon);
  }

  /* Botones de acción admin */
  .admin-btn {
    font-family: inherit;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    border: 1px solid var(--card-border);
    background: linear-gradient(180deg, var(--card-fill-top), var(--card-fill-bottom));
    color: var(--text-dark);
    text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.5);
  }
  .admin-btn:hover {
    filter: brightness(1.05);
  }
  .admin-btn.delete-btn {
    background: #5a1414;
    color: #ffffff;
    border-color: #3a0c0c;
    text-shadow: 1px 1px 0px rgba(0,0,0,0.5);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
  }
  .admin-btn.delete-btn:hover {
    background: #731e1e;
  }

  /* Panel desplegable de Skills (Flotante) */
  .dropdown-panel {
    position: absolute;
    z-index: 250;
    background-image: url('assets/cuadrado_menu.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    padding: 14px;
    padding-right: 26px;
    display: none;
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }
  .dropdown-panel::-webkit-scrollbar {
    width: 18px;
  }
  .dropdown-panel::-webkit-scrollbar-track {
    background: transparent;
  }
  .dropdown-panel::-webkit-scrollbar-thumb {
    background-image: url('assets/scroll.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
  }
  .dropdown-panel.list-panel.open { display: flex; flex-wrap: wrap; gap: 6px; }
  .dropdown-panel.grid-panel {
    width: 280px;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .dropdown-panel.grid-panel.open {
    display: grid;
  }
  .skill-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
    font-family: inherit;
  }
  .skill-option img {
    width: 60px;
    height: 60px;
    object-fit: cover;
    opacity: 1;
    transition: opacity .15s ease;
  }
  .skill-option span {
    font-size: 9px;
    color: var(--text-dark);
    text-align: center;
  }
  .list-option {
    background: none;
    border: none;
    padding: 2px;
    cursor: pointer;
    flex: 0 0 auto;
  }
  .list-option img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    display: block;
  }
  .list-option:hover img { opacity: 0.7; }

  /* Overlay de confirmación */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
  }
  .confirm-overlay.open {
    display: flex;
  }
  .confirm-box {
    background-image: url('assets/panel_dialogo.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    width: 320px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    animation: modalFadeIn 0.2s ease-out;
  }
  .confirm-text {
    font-size: 13px;
    color: var(--text-dark);
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .confirm-actions {
    display: flex;
    justify-content: center;
    gap: 30px;
  }
  .confirm-link {
    font-family: inherit;
    font-size: 15px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    text-decoration: underline;
    text-decoration-style: dotted;
  }
  .confirm-link.yes {
    color: #1a4fb5;
  }
  .confirm-link.no {
    color: var(--maroon);
  }

</style>
</head>
<body>

<div class="hotbar">
  <div class="hotbar-nav">
    <a href="libreria.html" class="active-link">Libreria.</a>
    <span class="sep">|</span>
    <a href="perfiles.html">Perfiles.</a>
    <span class="sep">|</span>
    <a href="index.html">Registro.</a>
    <span class="sep">|</span>
    <a href="perfil.html">Mi Perfil.</a>
  </div>
  <div class="hotbar-search">
    <input type="text" id="hotbar-search-input" placeholder="Buscar..." autocomplete="off">
    <button type="button" class="search-clear-btn" id="search-clear-btn">✕</button>
    <span class="search-icon">🔍</span>
  </div>
</div>

<div class="card-scale-wrapper" id="card-scale-wrapper">
  <div class="library-card" id="library-card">
    
    <!-- Sidebar de categorías -->
    <div class="sidebar-panel">

const $ = (id) => document.getElementById(id);
const card        = $('library-card');
const cardWrapper = $('card-scale-wrapper');

function updateCardScale(){
  card.style.transform = 'scale(1)';
  const available = cardWrapper.parentElement.clientWidth;
  const scale = Math.min(1, available / card.offsetWidth);
  card.style.transform = `scale(${scale})`;
  cardWrapper.style.width  = (card.offsetWidth  * scale) + 'px';
  cardWrapper.style.height = (card.offsetHeight * scale) + 'px';
}
window.addEventListener('resize', updateCardScale);
window.addEventListener('orientationchange', updateCardScale);
if(document.fonts?.ready) document.fonts.ready.then(updateCardScale);

async function refreshAdminUIFromSession(){
  try{
    const { data: { session } } = await db.auth.getSession();
    if(!session){
      isAdmin = false;
      $('btn-add-char').style.display = 'none';
      if($('detail-modal').classList.contains('open')) setAdminEditMode(false);
      return;
    }
    // ¿Es admin? Lo consultamos vía RPC (definida en el SQL de migración).
    const { data: isAdm } = await db.rpc('is_admin');
    isAdmin = !!isAdm;
    currentUser = session.user;
  } catch(_){
    isAdmin = false;
  }
  $('btn-add-char').style.display = isAdmin ? 'flex' : 'none';
  if($('detail-modal').classList.contains('open')) setAdminEditMode(isAdmin);
}

function refreshAdminUI(){
  $('btn-add-char').style.display = isAdmin ? 'flex' : 'none';
  if($('detail-modal').classList.contains('open')) setAdminEditMode(isAdmin);
}

/* ==========================================================================
   CATEGORÍAS Y GRILLA DE PERSONAJES
   ========================================================================== */
async function selectCategory(category){
  currentCategory = category;
  document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
  if(category === 'Kages')   $('btn-cat-kages').classList.add('active');
  if(category === 'Bestias') $('btn-cat-bestias').classList.add('active');
  $('default-view').style.display = 'none';
  $('characters-grid').style.display = 'grid';
  await renderCharacters();
}

async function renderCharacters(){
  const grid = $('characters-grid');
  grid.innerHTML = '<div style="grid-column:span 3;text-align:center;padding-top:60px;color:var(--text-muted);font-size:12px;">Cargando...</div>';

  const searchVal = $('hotbar-search-input').value.trim().toLowerCase();

  let query = db.from('characters').select('*').eq('category', currentCategory).eq('is_wiki', true).order('id');
  const { data, error } = await query;

  if(error){
    grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding-top:60px;color:#d32f2f;font-size:11px;">Error al cargar: ${error.message}</div>`;
    return;
  }

  const filtered = (data || []).filter(c =>
    (c.name  || '').toLowerCase().includes(searchVal) ||
    (c.roblox|| '').toLowerCase().includes(searchVal)
  );

  if(filtered.length === 0){
    grid.innerHTML = `<div style="grid-column:span 3;text-align:center;padding-top:80px;color:var(--text-muted);font-size:12px;">No se encontraron personajes.</div>`;
    return;
  }

  grid.innerHTML = '';
  filtered.forEach(char => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'character-card';
    btn.onclick = () => openModal(char);

    const portWrap = document.createElement('div');
    portWrap.className = 'card-portrait-wrapper';
    const img = document.createElement('img');
    img.src = char.portrait_list || 'assets/foto_lista1.png';
    img.alt = char.name || 'Personaje';
    img.onerror = () => { img.style.background = '#ccc'; };
    portWrap.appendChild(img);

    const textWrap = document.createElement('div');
    textWrap.className = 'card-text';
    // Mostrar el primer tag/mode como imagen si existe
    const modes = char.modes || [];
    if(modes.length > 0){
      const tagImg = document.createElement('img');
      tagImg.className = 'card-tag-img';
      tagImg.src = modes[0];
      tagImg.alt = 'Tag';
      tagImg.style.cssText = 'width:90%;height:auto;display:block;margin:0 auto 2px;';
      tagImg.onerror = () => { tagImg.style.display = 'none'; };
      textWrap.appendChild(tagImg);
    }
    const nameSpan = document.createElement('span'); nameSpan.className = 'card-name'; nameSpan.textContent = char.name || 'Name';
    textWrap.appendChild(nameSpan);

    btn.appendChild(portWrap);
    btn.appendChild(textWrap);
    grid.appendChild(btn);
  });
}

/* ==========================================================================

const searchInput = $('hotbar-search-input');
const clearBtn    = $('search-clear-btn');

searchInput.addEventListener('input', () => {
  clearBtn.style.display = searchInput.value ? 'flex' : 'none';
  if(currentCategory) renderCharacters();
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  searchInput.focus();
  if(currentCategory) renderCharacters();
});
searchInput.addEventListener('keydown', e => {
  if(e.key !== 'Enter') return;
  if(!currentCategory) selectCategory('Kages');
  else renderCharacters();
});

/* ==========================================================================
   MODAL DE DETALLE
   ========================================================================== */
function openModal(character){
  currentCharId = character.id;
  adminSkills   = [...(character.skills || [])];
  adminModes    = [...(character.modes || [])];
  // Guardar ruta original del retrato para poder guardarlo después
  currentPortraitUrl = character.portrait_info || 'assets/foto_info.png';

  $('m-portrait').src = currentPortraitUrl;

  // Campos texto
  $('m-name').textContent   = character.name   || '';
  $('m-roblox').textContent = character.roblox  || '';
  $('m-age').textContent    = character.age     || '';
  $('m-gender').textContent = character.gender  || '';
  $('m-bio').textContent    = character.bio     || '';

  // Campos edit
  $('m-name-edit').value   = character.name   || '';
  $('m-roblox-edit').value = character.roblox  || '';
  $('m-age-edit').value    = character.age     || '';
  $('m-gender-edit').value = character.gender  || '';
  $('m-bio-edit').value    = character.bio     || '';

  // Modos
  renderModes(character.modes || []);
  // Skills
  renderModalSkills();

  // Admin mode toggle
  setAdminEditMode(isAdmin);

  $('detail-modal').classList.add('open');
}

function renderModes(modes){
  const container = $('m-modes-container');
  container.innerHTML = '';
  if(!modes || modes.length === 0){
    // Placeholder visible para admin (área de click clara)
    const ph = document.createElement('span');
    ph.className = 'empty-slot';
    ph.textContent = '+';
    ph.style.cssText = 'font-size:16px;color:var(--text-muted);';
    container.appendChild(ph);
    return;
  }
  modes.forEach(path => {
    const img = document.createElement('img');
    img.src = path;
    img.alt = 'Modo';
    img.onerror = () => img.remove();
    container.appendChild(img);
  });
}

function renderModalSkills(){
  [1,2].forEach(n => {
    const slot = $('m-skill-' + n);
    slot.innerHTML = '';
    const path = adminSkills[n-1];
    if(path){
      const img = document.createElement('img');
      img.src = path;
      img.alt = 'Skill ' + n;
      img.onerror = () => { slot.innerHTML = '<span class="empty-slot">+</span>'; };
      slot.appendChild(img);
    } else {
      slot.innerHTML = '<span class="empty-slot">+</span>';
    }
    // Clic en slot (admin): abrir picker
    if(isAdmin){
      slot.style.cursor = 'pointer';
      slot.onclick = (e) => { e.stopPropagation(); toggleSkillsPicker(); };
    } else {
      slot.style.cursor = 'default';
      slot.onclick = null;
    }
  });
}

function setAdminEditMode(admin){
  // Alternar entre spans (vista) e inputs (edición)
  document.querySelectorAll('.m-view-field').forEach(el => {
    el.style.display = admin ? 'none' : '';
  });
  [$('m-name-edit'),$('m-roblox-edit'),$('m-age-edit'),$('m-gender-edit')].forEach(el => {
    el.style.display = admin ? '' : 'none';
  });
  $('m-bio-edit').style.display = admin ? '' : 'none';
  $('admin-actions').style.display = admin ? 'flex' : 'none';
  // Refrescar skill slots para agregar/quitar clic handler
  renderModalSkills();
  // Hacer el contenedor de modes y el botón clickeables para admins
  const modesContainer = $('m-modes-container');
  const tagBtn = $('btn-select-tag-lib');
  // Botón de cambiar foto para admin
  const portraitBtn = $('btn-change-portrait');
  const portraitUpload = $('m-portrait-upload');
  if(admin){
    portraitBtn.style.display = 'block';
    portraitBtn.onclick = () => portraitUpload.click();
    modesContainer.style.cursor = 'pointer';
    modesContainer.onclick = (e) => {
      e.stopPropagation();
      toggleTagsPicker();
    };
    tagBtn.style.display = '';
    tagBtn.onclick = (e) => {
      e.stopPropagation();
      toggleTagsPicker();
    };
  } else {
    portraitBtn.style.display = 'none';
    portraitBtn.onclick = null;
    modesContainer.style.cursor = 'default';
    modesContainer.onclick = null;
    tagBtn.style.display = 'none';
    tagBtn.onclick = null;
  }
}

function closeModal(){
  $('detail-modal').classList.remove('open');
  $('skills-picker').classList.remove('open');
  $('tags-picker').classList.remove('open');
  currentCharId = null;
}

$('detail-modal').addEventListener('click', e => {
  if(e.target === $('detail-modal')) closeModal();
});

/* ---------- Skills Picker (admin) ---------- */
const skillsPicker = $('skills-picker');
SKILL_OPTIONS.forEach(opt => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'skill-option';
  const img = document.createElement('img');
  img.src = opt.image; img.alt = opt.name;
  img.onerror = () => { img.style.background = '#ccc'; };
  const lbl = document.createElement('span');
  lbl.textContent = opt.name;
  btn.appendChild(img);
  btn.appendChild(lbl);
  btn.addEventListener('click', () => {
    const idx = adminSkills.indexOf(opt.image);
    if(idx >= 0){
      adminSkills.splice(idx, 1);
    } else {
      if(adminSkills.length >= 2){ adminSkills.shift(); }
      adminSkills.push(opt.image);
    }
    renderModalSkills();
    skillsPicker.classList.remove('open');
  });
  skillsPicker.appendChild(btn);
});

function toggleSkillsPicker(){
  // Cierra el de tags para evitar superposición
  tagsPicker.classList.remove('open');
  skillsPicker.classList.toggle('open');
}

/* ---------- Tags Picker (admin) ---------- */
const tagsPicker = $('tags-picker');
TAG_OPTIONS.forEach(opt => {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'list-option';
  const img = document.createElement('img');
  img.src = opt.image; img.alt = opt.name;
  img.onerror = () => { img.style.background = '#ccc'; };
  btn.appendChild(img);
  btn.addEventListener('click', () => {
    const idx = adminModes.indexOf(opt.image);
    if(idx >= 0){
      adminModes.splice(idx, 1);
    } else {
      adminModes = [opt.image]; // Solo un tag a la vez
    }
    renderModes(adminModes);
    tagsPicker.classList.remove('open');
  });
  tagsPicker.appendChild(btn);
});

function toggleTagsPicker(){
  // Cierra el de skills para evitar superposición
  skillsPicker.classList.remove('open');
  tagsPicker.classList.toggle('open');
}

/* ---------- Portrait upload (admin) ---------- */
$('m-portrait-upload').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const dataUrl = ev.target.result;
    $('m-portrait').src = dataUrl;
    currentPortraitUrl = dataUrl;
  };
  reader.readAsDataURL(file);
});

/* ==========================================================================
   GUARDAR / BORRAR PERSONAJE (ADMIN)
   ========================================================================== */
async function saveCharacter(){
  if(!currentCharId) return;
  const updates = {
    name:    $('m-name-edit').value.trim(),
    roblox:  $('m-roblox-edit').value.trim(),
    age:     $('m-age-edit').value.trim(),
    gender:  $('m-gender-edit').value.trim(),
    bio:     $('m-bio-edit').value.trim(),
    skills:  adminSkills,
    modes:   adminModes,
    portrait_info: currentPortraitUrl,
    portrait_list: currentPortraitUrl,
  };
  const { error } = await db.from('characters').update(updates).eq('id', currentCharId);
  if(error){ alert('Error al guardar: ' + error.message); return; }
  closeModal();
  await renderCharacters();
}

function askDeleteCharacter(){
  $('confirm-delete-overlay').classList.add('open');
}
function cancelDelete(){
  $('confirm-delete-overlay').classList.remove('open');
}
async function confirmDelete(){
  $('confirm-delete-overlay').classList.remove('open');
  if(!currentCharId) return;
  const { error } = await db.from('characters').delete().eq('id', currentCharId);
  if(error){ alert('Error al borrar: ' + error.message); return; }
  closeModal();
  await renderCharacters();
}

async function addCharacter(){
  if(!currentCategory) { alert('Selecciona una categoría primero.'); return; }
  const { error } = await db.from('characters').insert({
    category: currentCategory,
    skills: [],
    modes: [],
    portrait_list: 'assets/foto_lista1.png',
    portrait_info: 'assets/foto_info.png',
    name:'', roblox:'', age:'', gender:'', bio:'',
    is_wiki: true
  });
  if(error){ alert('Error al añadir: ' + error.message); return; }
  await renderCharacters();
}

    selectCategory('Kages');

});
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registro Civil</title>
<style>
  /* ============================================================
     FUENTE LOCAL
     ============================================================
     Descarga la fuente "Pixel Arial 11" (búscala como "Pixel Arial 11
     font download", es una fuente pixel freeware muy común).
     Renombra el archivo descargado a exactamente:
        PixelArial11.ttf
     y colócalo en la misma carpeta que este index.html.
     Si tu archivo trae otro nombre, cambia el "src" de aquí abajo.
     ============================================================ */
  @font-face{
    font-family:'Pixel Arial 11';
    src:url('PixelArial11.ttf') format('truetype');
    font-weight:normal;
    font-style:normal;
    font-display:swap;
  }
</style>
<style>
  :root{
    --page-bg:#5C8D70;
    --card-border:#a99b78;
    --card-fill-top:#ece6d6;
    --card-fill-bottom:#e2dbc6;
    --field-bg:#f6f2e6;
    --field-border:#b6a985;
    --text-muted:#8a7c5f;
    --text-dark:#4a3a24;
    --maroon:#5a1414;
    --gray-btn:#6d6d6d;
    --gray-btn-dark:#565656;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background:var(--page-bg);
    font-family:'Pixel Arial 11', monospace;
    color:var(--text-dark);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:40px 16px 80px;
  }

  .card{
    position:relative;
    width:100%;
    max-width:640px;
    box-sizing:border-box;
    /* Relleno interior (se ve entre los bordes del marco) */
    background:linear-gradient(180deg,var(--card-fill-top),var(--card-fill-bottom));
    /* Marco: se recorta en 9 partes para que el borde no se deforme
       aunque la ficha crezca mucho de alto. Si el marco se ve muy
       grueso o muy fino comparado con tu imagen, ajusta el % de
       border-image-slice y el px de border-width juntos. */
    border-style:solid;
    border-width:22px;
    border-image-source:url('assets/base_cuadrada.png');
    border-image-slice:6%;
    border-image-repeat:stretch;
    padding:26px 24px;
  }

  h1.title{
    margin:0 0 28px 0;
    font-size:56px;
    font-weight:700;
    color:var(--maroon);
    letter-spacing:1px;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 220px;
    gap:0 24px;
  }

  .col-left{display:flex;flex-direction:column;}
  .col-right{display:flex;flex-direction:column;align-items:stretch;}

  label.field-label{
    font-size:15px;
    color:var(--text-dark);
    margin-bottom:6px;
    display:block;
  }

  /* caja combinada: "Etiqueta: valor" en una sola línea, como la plantilla */
  .field-box{
    display:flex;
    align-items:center;
    gap:6px;
    width:100%;
    background-image:url('assets/rectangulo_de_escribir_largo.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    padding:10px 16px;
    margin-bottom:16px;
  }
  .field-box label{
    font-size:16px;
    color:var(--text-muted);
    white-space:nowrap;
    flex:none;
  }
  .field-box input{
    flex:1;
    min-width:0;
    font-family:inherit;
    font-size:16px;
    color:var(--text-dark);
    background:transparent;
    border:none;
    padding:0;
    margin:0;
    outline:none;
  }

  .field-box-narrow{
    max-width:220px;
    background-image:url('assets/rectangulo_de_escribir_pequeno.png');
  }

  .skills-title{font-size:20px;margin:4px 0 8px 0;}
  .skills-row{display:flex;gap:14px;margin-bottom:18px;}
  .skill-slot{
    width:80px;height:80px;
    background-image:url('assets/cuadrado_seleccion_skills.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    padding:0;
    overflow:hidden;
  }
  .skill-slot img{
    width:70%;height:70%;
    object-fit:cover;
    opacity:1;
  }

  .clan-row{display:flex;align-items:center;gap:14px;margin-top:4px;position:relative;}
  .clan-row label.field-label{margin-bottom:0;}

  .btn-select-img{
    display:block;
    width:130px;
    height:auto;
    cursor:pointer;
  }

  /* Clan y Tags: cuando hay selección, se muestra solo la imagen (sin botón gris) */
  .clan-display, .tags-display{
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:6px;
  }
  .clan-display img, .tags-display img{
    display:block;
    max-width:160px;
    height:auto;
  }
  .clan-display .fallback, .tags-display .fallback{
    background:var(--gray-btn);
    color:#fff;
    font-size:13px;
    padding:8px 14px;
  }

  .photo-box{
    width:100%;
    aspect-ratio:1/1;
    background-image:url('assets/cuadrado_foto_importacion.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    overflow:hidden;
    color:var(--text-muted);
    font-size:13px;
    text-align:center;
    padding:8px;
  }
  .photo-box img{width:100%;height:100%;object-fit:cover;}
  .photo-box input{display:none;}

  .tags-row{display:flex;align-items:center;gap:14px;margin-top:18px;position:relative;}

  /* ---- Panel desplegable genérico (Skills / Clan / Tags) ---- */
  .dropdown-panel{
    position:absolute;
    z-index:50;
    background-image:url('assets/cuadrado_menu.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    box-shadow:0 6px 16px rgba(0,0,0,0.2);
    padding:14px;
    padding-right:26px; /* deja espacio para el scroll con imagen */
    display:none;
    max-height:280px;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch; /* scroll suave con el dedo en iOS/Android */
    scrollbar-width:thin; /* Firefox: no soporta scroll con imagen, deja uno fino */
  }
  .dropdown-panel.open{display:block;}
  .dropdown-panel .panel-hint{
    font-size:12px;color:var(--text-muted);margin-bottom:8px;
  }

  /* Scroll con imagen propia (Chrome, Edge, Safari, y sus versiones móviles).
     El arrastre táctil en celular funciona igual, esto solo cambia el look
     de la barra cuando el menú se ve en una pantalla con mouse/dedo. */
  .dropdown-panel::-webkit-scrollbar{
    width:18px;
  }
  .dropdown-panel::-webkit-scrollbar-track{
    background:transparent;
  }
  .dropdown-panel::-webkit-scrollbar-thumb{
    background-image:url('assets/scroll.png');
    background-size:100% 100%;
    background-repeat:no-repeat;
    border-radius:0;
  }
  .dropdown-panel::-webkit-scrollbar-button{
    display:none;
    height:0;
    width:0;
  }

  /* variante en grilla (Skills) */
  .dropdown-panel.grid-panel{
    width:280px;
    display:none;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .dropdown-panel.grid-panel.open{display:grid;}
  .skill-option{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    cursor:pointer;background:none;border:none;padding:4px;
    font-family:inherit;
  }
  .skill-option img{
    width:70px;height:70px;object-fit:cover;
    opacity:1;
    transition:opacity .15s ease;
  }
  .skill-option.selected img{opacity:0.5;}
  .skill-option span{font-size:11px;color:var(--text-dark);text-align:center;}

  /* variante en lista (Clan / Tags) */
  .list-panel{width:220px;}
  .list-option{
    display:block;width:100%;
    background:none;border:none;padding:4px 0;
    cursor:pointer;margin-bottom:8px;
  }
  .list-option img{
    width:100%;
    display:block;
    opacity:1;
    transition:opacity .15s ease;
  }
  .list-option.selected img{opacity:0.5;}
  .list-option .fallback{
    width:100%;padding:10px;text-align:center;
    background:var(--gray-btn);color:#fff;font-size:13px;
    opacity:1;
    transition:opacity .15s ease;
  }
  .list-option.selected .fallback{opacity:0.5;}

  .actions{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:36px;
  }
  .actions button{
    background:none;border:none;
    font-family:inherit;
    font-size:26px;
    color:var(--maroon);
    cursor:pointer;
    text-decoration:underline;
    text-decoration-style:dotted;
  }
  .actions button:hover{opacity:0.75;}

  .status{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    min-height:20px;
  }
  .status.ok{color:#2f5a2f;}
  .status.err{color:#8a1f1f;}

  /* ---- Modal de error (campos incompletos) ---- */
  .error-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.2);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
    cursor:pointer;
    padding:20px;
  }
  .error-overlay.open{display:flex;}
  .error-box{
    background:linear-gradient(180deg,var(--card-fill-top),var(--card-fill-bottom));
    border:2px solid var(--card-border);
    outline:5px solid #fff;
    padding:30px 34px;
    max-width:420px;
    width:100%;
  }
  .error-title{
    font-size:36px;
    color:var(--text-dark);
    margin-bottom:14px;
  }
  .error-message{
    font-size:17px;
    line-height:1.5;
    color:var(--text-muted);
  }
  .error-hint{
    margin-top:16px;
    font-size:12px;
    color:var(--text-muted);
    opacity:0.8;
  }

  @media (max-width:520px){
    .grid{grid-template-columns:1fr;}
    .col-right{margin-top:20px;}
    h1.title{font-size:42px;}
    .dropdown-panel{left:0 !important;right:0 !important;width:auto !important;}
  }
</style>
</head>
<body>

<div class="card" id="card">
  <h1 class="title">Civil</h1>

  <div class="grid">
    <div class="col-left">
      <div class="field-box">
        <label for="f-name">Name:</label>
        <input type="text" id="f-name" />
      </div>

      <div class="field-box">
        <label for="f-age">Age:</label>
        <input type="number" id="f-age" min="0" />
      </div>

      <div class="field-box field-box-narrow">
        <label for="f-rank">Rank:</label>
        <input type="text" id="f-rank" />
      </div>

      <div class="field-box">
        <label for="f-zodiacal">Zodiacal:</label>
        <input type="text" id="f-zodiacal" />
      </div>

      <div class="skills-title">Skills <span style="font-size:12px;color:var(--text-muted);">(máx. 2)</span></div>
      <div class="skills-row">
        <div class="skill-slot" id="skill-slot-1"></div>
        <div class="skill-slot" id="skill-slot-2"></div>
      </div>
      <div class="dropdown-panel grid-panel" id="skills-panel"></div>

      <div class="clan-row">
        <label class="field-label">Clan:</label>
        <div class="clan-display" id="clan-display"></div>
        <div class="dropdown-panel list-panel" id="clan-panel"></div>
      </div>
    </div>

    <div class="col-right">
      <div class="photo-box" id="photo-box">
        <span id="photo-placeholder">Foto</span>
        <input type="file" id="f-photo" accept="image/*" />
      </div>

      <div class="field-box" style="margin-top:18px;">
        <label for="f-fecha">Fecha:</label>
        <input type="date" id="f-fecha" />
      </div>

      <div class="tags-row">
        <label class="field-label">Tags:</label>
        <div class="tags-display" id="tags-display"></div>
        <div class="dropdown-panel list-panel" id="tags-panel"></div>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Máximo 3 tags</div>
    </div>
  </div>
</div>

<div class="actions">
  <button type="button" id="btn-limpiar">Limpiar</button>
  <button type="button" id="btn-enviar">Enviar</button>
</div>

<div class="status" id="status"></div>

<div class="error-overlay" id="error-overlay">
  <div class="error-box">
    <div class="error-title">Error:</div>
    <div class="error-message" id="error-message">
      Olvidaste un campo por completar.<br>Por favor completa todos los campos.
    </div>
    <div class="error-hint">(toca este mensaje para cerrarlo)</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ================================================================
   CONFIGURACIÓN
   ================================================================
   Assets del template (fondo de la ficha, cajas, menú, botón
   "Seleccionar") están en la carpeta /UI del repositorio:
     assets/base_cuadrada.png
     assets/cuadrado_menu.png
     assets/cuadrado_seleccion_skills.png
     assets/cuadrado_foto_importacion.png
     assets/menu_seleccion.png
     assets/rectangulo_de_escribir_largo.png
     assets/rectangulo_de_escribir_pequeno.png
     assets/scroll.png (imagen del "pulgar" de la barra de scroll en los menús)

   Sube tus imágenes de contenido al repositorio en estas otras carpetas:
     /Clan/    -> imagen completa de cada clan (ya con su nombre dibujado)
     /Skills/  -> icono cuadrado 1x1 de cada skill
     /Tags/    -> imagen completa de cada tag (ya con su nombre dibujado)

   Luego actualiza las rutas ("image") de las listas de abajo para que
   coincidan con los nombres de archivo que subiste.
   ================================================================ */

const WEBHOOK_URL = "PON_AQUI_TU_WEBHOOK_URL";

const CLAN_OPTIONS = [
  { name: "Mizu", image: "Clan/mizu.png" },
  { name: "Rain", image: "Clan/rain.png" },
];

const SKILL_OPTIONS = [
  { name: "Arte: Fans de Hielo", image: "Skills/fans_hielo.png" },
  { name: "Katana: Agua Calma", image: "Skills/katana_agua_calma.png" },
  { name: "Arte: Biwa", image: "Skills/biwa.png" },
  { name: "Arte: Emociones", image: "Skills/emociones.png" },
];

const TAG_OPTIONS = [
  { name: "Mizukage", image: "Tags/mizukage.png" },
  { name: "Beasts", image: "Tags/beasts.png" },
  { name: "Capricorn", image: "Tags/capricorn.png" },
  { name: "Cupcake", image: "Tags/cupcake.png" },
  { name: "Taurus", image: "Tags/taurus.png" },
];

const MAX_SKILLS = 2;
const MAX_TAGS = 3;

/* ================================================================
   LÓGICA — normalmente no necesitas tocar nada de aquí abajo
   ================================================================ */

const $ = (id) => document.getElementById(id);
const card = $('card');

function positionPanel(panel, anchorEl){
  const cardRect = card.getBoundingClientRect();
  const anchorRect = anchorEl.getBoundingClientRect();
  panel.style.left = (anchorRect.left - cardRect.left) + 'px';
  panel.style.top = (anchorRect.bottom - cardRect.top + 6) + 'px';
}

function closeAllPanels(except){
  document.querySelectorAll('.dropdown-panel').forEach(p=>{
    if(p!==except) p.classList.remove('open');
  });
}
document.addEventListener('click', (e)=>{
  const isPanel = e.target.closest('.dropdown-panel');
  const isTrigger = e.target.closest('.clan-display, .tags-display, .skill-slot');
  if(!isPanel && !isTrigger) closeAllPanels(null);
});

/* ---------- Imagen con fallback de texto si no existe el archivo ---------- */
function imgWithFallback(src, alt, className){
  const wrap = document.createElement('span');
  const img = document.createElement('img');
  img.src = src; img.alt = alt; if(className) img.className = className;
  img.onerror = ()=>{
    img.remove();
    const fb = document.createElement('span');
    fb.className = 'fallback';
    fb.textContent = alt;
    wrap.appendChild(fb);
  };
  wrap.appendChild(img);
  return wrap;
}

/* ---------- Skills: panel en grilla, selección compartida máx. 2 ---------- */
let selectedSkills = []; // {name, image}
const skillsPanel = $('skills-panel');

SKILL_OPTIONS.forEach(opt=>{
  const btn = document.createElement('button');
  btn.type='button';
  btn.className='skill-option';
  const img = document.createElement('img');
  img.src = opt.image; img.alt = opt.name;
  img.onerror = ()=>{ img.style.background = '#ccc'; };
  const label = document.createElement('span');
  label.textContent = opt.name;
  btn.appendChild(img);
  btn.appendChild(label);
  btn.dataset.name = opt.name;
  btn.addEventListener('click', ()=> toggleSkill(opt, btn));
  skillsPanel.appendChild(btn);
});

function toggleSkill(opt, btn){
  const idx = selectedSkills.findIndex(s=>s.name===opt.name);
  if(idx>=0){
    selectedSkills.splice(idx,1);
    btn.classList.remove('selected');
  } else {
    if(selectedSkills.length>=MAX_SKILLS){
      alert('Máximo '+MAX_SKILLS+' skills.');
      return;
    }
    selectedSkills.push(opt);
    btn.classList.add('selected');
  }
  renderSkillSlots();
}

function renderSkillSlots(){
  [1,2].forEach(n=>{
    const slot = $('skill-slot-'+n);
    slot.innerHTML='';
    const skill = selectedSkills[n-1];
    if(skill){
      const img = document.createElement('img');
      img.src = skill.image; img.alt = skill.name; img.title = skill.name;
      img.onerror = ()=>{ slot.innerHTML=''; slot.textContent = skill.name; slot.style.fontSize='10px'; };
      slot.appendChild(img);
    }
    // si no hay skill, se deja vacío: el fondo cuadrado_seleccion_skills.png ya muestra el "+"
  });
}
renderSkillSlots();

[$('skill-slot-1'), $('skill-slot-2')].forEach(slot=>{
  slot.addEventListener('click', (e)=>{
    e.stopPropagation();
    const willOpen = !skillsPanel.classList.contains('open');
    closeAllPanels(skillsPanel);
    if(willOpen){ positionPanel(skillsPanel, slot); skillsPanel.classList.add('open'); }
    else skillsPanel.classList.remove('open');
  });
});

/* ---------- Clan: panel en lista, selección única ---------- */
let selectedClan = null;
const clanPanel = $('clan-panel');
const clanDisplay = $('clan-display');

function renderClanDisplay(){
  clanDisplay.innerHTML='';
  if(selectedClan){
    clanDisplay.appendChild(imgWithFallback(selectedClan.image, selectedClan.name));
  } else {
    const img = document.createElement('img');
    img.src = 'assets/menu_seleccion.png';
    img.alt = 'Seleccionar';
    img.className = 'btn-select-img';
    clanDisplay.appendChild(img);
  }
}
renderClanDisplay();

CLAN_OPTIONS.forEach(opt=>{
  const btn = document.createElement('button');
  btn.type='button';
  btn.className='list-option';
  btn.appendChild(imgWithFallback(opt.image, opt.name));
  btn.addEventListener('click', ()=>{
    if(selectedClan && selectedClan.name===opt.name){
      // ya estaba seleccionado -> deseleccionar (vuelve a 100% visible)
      selectedClan = null;
      btn.classList.remove('selected');
    } else {
      selectedClan = opt;
      clanPanel.querySelectorAll('.list-option').forEach(o=>o.classList.remove('selected'));
      btn.classList.add('selected');
    }
    renderClanDisplay();
  });
  clanPanel.appendChild(btn);
});

clanDisplay.addEventListener('click', (e)=>{
  e.stopPropagation();
  const willOpen = !clanPanel.classList.contains('open');
  closeAllPanels(clanPanel);
  if(willOpen){ positionPanel(clanPanel, clanDisplay); clanPanel.classList.add('open'); }
  else clanPanel.classList.remove('open');
});

/* ---------- Tags: panel en lista, selección múltiple máx. 3 ---------- */
let selectedTags = [];
const tagsPanel = $('tags-panel');
const tagsDisplay = $('tags-display');

function renderTagsDisplay(){
  tagsDisplay.innerHTML='';
  if(selectedTags.length){
    selectedTags.forEach(t=> tagsDisplay.appendChild(imgWithFallback(t.image, t.name)));
  } else {
    const img = document.createElement('img');
    img.src = 'assets/menu_seleccion.png';
    img.alt = 'Seleccionar';
    img.className = 'btn-select-img';
    tagsDisplay.appendChild(img);
  }
}
renderTagsDisplay();

TAG_OPTIONS.forEach(opt=>{
  const btn = document.createElement('button');
  btn.type='button';
  btn.className='list-option';
  btn.appendChild(imgWithFallback(opt.image, opt.name));
  btn.addEventListener('click', ()=>{
    const idx = selectedTags.findIndex(t=>t.name===opt.name);
    if(idx>=0){
      selectedTags.splice(idx,1);
      btn.classList.remove('selected');
    } else {
      if(selectedTags.length>=MAX_TAGS){
        alert('Máximo '+MAX_TAGS+' tags.');
        return;
      }
      selectedTags.push(opt);
      btn.classList.add('selected');
    }
    renderTagsDisplay();
  });
  tagsPanel.appendChild(btn);
});

tagsDisplay.addEventListene
